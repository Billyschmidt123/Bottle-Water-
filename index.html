<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/theme.css">
    <link rel="stylesheet" href="CSS/map.css">
    
    <style>
        .app-container { display: flex; flex-direction: row; width: 100%; height: calc(100vh - 60px); overflow: hidden; }
        #mapPanel { flex: 0 0 70%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background-color: #ddd; }
        #sidebar { flex: 0 0 30%; height: 100%; border-left: 1px solid #ccc; overflow-y: auto; background: #f9f9f9; }
        
        .manager-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .manager-menu-content { background: white; padding: 30px; border-radius: 8px; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 20px; font-size: 1.1rem; border: none; border-radius: 5px; cursor: pointer; background: #007bff; color: white; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .close-btn { background: #dc3545; margin-top: 20px; padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; }

        .sub-menu-pane { display: none; }
        .active-pane { display: block !important; }

        .maint-toolbar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .search-input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        .add-btn { background: #28a745; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .table-container { width: 100%; overflow-x: auto; max-height: 500px; border: 1px solid #ddd; }
        .maint-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .maint-table th, .maint-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .maint-table th { background: #f8f9fa; position: sticky; top: 0; }

        .crud-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .crud-content { background: white; padding: 25px; border-radius: 8px; width: 800px; max-width: 90%; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap"><option value="">-- Select Route --</option></select>
        </div>
        <div class="topbar-right">
            <button id="openManagerBtn" class="btn-top"><i class="fas fa-user-gear"></i> Manager Portal</button>
            <button class="btn-top" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </header>

    <div id="managerOverlay" class="manager-overlay">
        <div class="manager-menu-content">
            <div id="managerGrid">
                <h2 style="text-align: center;">LogiFlow Manager Portal</h2>
                <div class="menu-grid">
                    <button class="menu-btn" id="prodMaintBtn"><i class="fas fa-box"></i> Product Management</button>
                    <button class="menu-btn" id="custMaintBtn"><i class="fas fa-users"></i> Customer Management</button>
                </div>
                <div style="text-align: center;"><button id="closeManagerBtn" class="close-btn">Exit Portal</button></div>
            </div>
            
            <div id="productPane" class="sub-menu-pane">
                <h3>Product Maintenance</h3>
                <div class="maint-toolbar">
                    <button class="add-btn" id="addNewProdBtn">Add Product</button>
                    <input type="text" id="prodSearch" class="search-input" placeholder="Search products...">
                </div>
                <div class="table-container">
                    <table class="maint-table">
                        <thead id="prodTableHead"></thead>
                        <tbody id="prodTableBody"></tbody>
                    </table>
                </div>
                <button class="close-btn backToMain">Back</button>
            </div>

            <div id="customerPane" class="sub-menu-pane">
                <h3>Customer Maintenance</h3>
                <div class="maint-toolbar">
                    <button class="add-btn" id="addNewCustBtn">Add Customer</button>
                    <input type="text" id="custSearch" class="search-input" placeholder="Search customers...">
                </div>
                <div class="table-container">
                    <table class="maint-table">
                        <thead id="custTableHead"></thead>
                        <tbody id="customerTableBody"></tbody>
                    </table>
                </div>
                <button class="close-btn backToMain">Back</button>
            </div>
        </div>
    </div>

    <div id="crudModal" class="crud-modal">
        <div class="crud-content">
            <h3 id="modalTitle">Maintenance</h3>
            <div id="modalFields" class="form-grid"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                <button id="saveCrudBtn" class="add-btn">Save Changes</button>
                <button id="cancelCrudBtn" class="close-btn" style="margin:0;">Cancel</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div id="mapPanel"><div id="map"></div></div>
        <aside id="sidebar"><div id="sidebarContent" style="padding: 20px;">Select a route to view details.</div></aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    (function () {
        const TOKEN = "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";
        const REPO = 'Billyschmidt123/Bottle-Water-';
        let masterCustomerData = [];
        let masterProductData = []; 
        let currentEditIndex = null;
        let currentEditType = 'customer'; 
        let routeFileHashes = {};
        let productFileHashes = {}; 

        async function loadProductMaintenance() {
            const head = document.getElementById('prodTableHead');
            const body = document.getElementById('prodTableBody');
            masterProductData = [];
            head.innerHTML = "";
            body.innerHTML = "<tr><td>Fetching from Products folder...</td></tr>";
            
            // Updated folder name to match your screenshot
            const folderPath = 'Products'; 
            const filesToLoad = ['Coffee.csv', 'Water.csv'];
            
            try {
                for (let fileName of filesToLoad) {
                    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${folderPath}/${fileName}`, {
                        headers: { 'Authorization': `token ${TOKEN}` }
                    });
                    
                    if (res.ok) {
                        const file = await res.json();
                        productFileHashes[fileName] = file.sha;
                        const csvRes = await fetch(file.download_url);
                        const text = await csvRes.text();
                        const lines = text.split(/\r?\n/).filter(l => l.trim());
                        
                        if (lines.length > 0) {
                            const headers = lines[0].split(',').map(h => h.trim());
                            if (head.innerHTML === "") {
                                head.innerHTML = `<tr><th>Edit</th>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
                            }
                            for (let i = 1; i < lines.length; i++) {
                                const values = lines[i].split(',');
                                const entry = { _file: fileName, _path: `${folderPath}/${fileName}` };
                                headers.forEach((h, idx) => entry[h] = values[idx] || "");
                                masterProductData.push(entry);
                            }
                        }
                    } else {
                        console.error(`Failed to find ${fileName} in ${folderPath}`);
                    }
                }
                renderTable('product', masterProductData);
            } catch (e) { 
                console.error(e);
                body.innerHTML = "<tr><td>Error loading products. Check console for details.</td></tr>"; 
            }
        }

        async function loadCustomerMaintenance() {
            const head = document.getElementById('custTableHead');
            const body = document.getElementById('customerTableBody');
            masterCustomerData = [];
            head.innerHTML = "";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/routes`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });
                const files = await res.json();
                for (let file of files.filter(f => f.name.endsWith('.csv'))) {
                    routeFileHashes[file.name] = file.sha;
                    const csvRes = await fetch(file.download_url);
                    const text = await csvRes.text();
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    if (lines.length > 0) {
                        const headers = lines[0].split(',').map(h => h.trim());
                        if (head.innerHTML === "") {
                            // Applied "Delivery Slip" label correction
                            head.innerHTML = `<tr><th>Edit</th>${headers.map(h => `<th>${(h === "Purchase Order" || h === "slip / po") ? "Delivery Slip" : h}</th>`).join('')}</tr>`;
                        }
                        for (let i = 1; i < lines.length; i++) {
                            const values = lines[i].split(',');
                            const entry = { _route: file.name };
                            headers.forEach((h, idx) => entry[h] = values[idx] || "");
                            masterCustomerData.push(entry);
                        }
                    }
                }
                renderTable('customer', masterCustomerData);
            } catch (e) { body.innerHTML = "<tr><td>Error loading customers.</td></tr>"; }
        }

        function renderTable(type, data) {
            const body = document.getElementById(type === 'customer' ? 'customerTableBody' : 'prodTableBody');
            body.innerHTML = data.map((row, idx) => `
                <tr>
                    <td><button onclick="openModal(${idx}, '${type}')">Edit</button></td>
                    ${Object.keys(row).filter(k => !k.startsWith('_')).map(k => `<td>${row[k]}</td>`).join('')}
                </tr>
            `).join('');
        }

        window.openModal = function(index, type) {
            currentEditIndex = index;
            currentEditType = type;
            const data = (type === 'customer') ? masterCustomerData[index] : masterProductData[index];
            document.getElementById('modalFields').innerHTML = Object.keys(data)
                .filter(k => !k.startsWith('_'))
                .map(k => {
                    const label = (k === "Purchase Order" || k === "slip / po") ? "Delivery Slip" : k;
                    return `<div class="form-group"><label>${label}</label><input type="text" value="${data[k]}" data-key="${k}"></div>`;
                }).join('');
            document.getElementById('crudModal').style.display = 'flex';
        };

        document.getElementById('saveCrudBtn').addEventListener('click', async () => {
            const data = (currentEditType === 'customer') ? masterCustomerData[currentEditIndex] : masterProductData[currentEditIndex];
            const path = (currentEditType === 'customer') ? `routes/${data._route}` : data._path;
            const fileName = (currentEditType === 'customer') ? data._route : data._file;
            const sha = (currentEditType === 'customer') ? routeFileHashes[fileName] : productFileHashes[fileName];
            
            document.querySelectorAll('#modalFields input').forEach(input => data[input.dataset.key] = input.value);
            
            const fileSet = (currentEditType === 'customer') 
                ? masterCustomerData.filter(d => d._route === fileName)
                : masterProductData.filter(d => d._file === fileName);

            const headers = Object.keys(data).filter(k => !k.startsWith('_'));
            const csv = headers.join(',') + '\n' + fileSet.map(r => headers.map(h => r[h]).join(',')).join('\n');

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${TOKEN}` },
                body: JSON.stringify({ message: `Update ${fileName}`, content: btoa(csv), sha: sha })
            });
            if (res.ok) { alert("Saved successfully."); location.reload(); }
        });

        document.getElementById('openManagerBtn').onclick = () => document.getElementById('managerOverlay').style.display = 'flex';
        document.getElementById('closeManagerBtn').onclick = () => document.getElementById('managerOverlay').style.display = 'none';
        document.getElementById('custMaintBtn').onclick = () => { document.getElementById('managerGrid').style.display = 'none'; document.getElementById('customerPane').classList.add('active-pane'); loadCustomerMaintenance(); };
        document.getElementById('prodMaintBtn').onclick = () => { document.getElementById('managerGrid').style.display = 'none'; document.getElementById('productPane').classList.add('active-pane'); loadProductMaintenance(); };
        document.querySelectorAll('.backToMain').forEach(b => b.onclick = () => { document.querySelectorAll('.sub-menu-pane').forEach(p => p.classList.remove('active-pane')); document.getElementById('managerGrid').style.display = 'block'; });
        document.getElementById('cancelCrudBtn').onclick = () => document.getElementById('crudModal').style.display = 'none';
    })();
    </script>
</body>
</html>
