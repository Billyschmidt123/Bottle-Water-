        /* ---------------------------------------------------------
           FIX: ADDITIVE EVENT LISTENERS
           The following block ensures the buttons trigger the views

           --------------------------------------------------------- */
        
        document.addEventListener('DOMContentLoaded', () => {
            const custBtn = document.getElementById('custMaintBtn');
            const prodBtn = document.getElementById('prodMaintBtn');
            const custPane = document.getElementById('customerMaintPane');
            const prodPane = document.getElementById('productMaintPane');

            if (custBtn) {
                custBtn.addEventListener('click', () => {
                    // Hide other panes if necessary, then show target
                    if(prodPane) prodPane.style.display = 'none';
                    custPane.style.display = 'block';
                    // Call the original function to populate data
                    loadAllCustomers();
                });
            }

            if (prodBtn) {
                prodBtn.addEventListener('click', () => {
                    // Hide other panes if necessary, then show target
                    if(custPane) custPane.style.display = 'none';
                    prodPane.style.display = 'block';
                    // Call the original function to populate data
                    loadProductFile('water'); // Defaulting to water per standard flow
