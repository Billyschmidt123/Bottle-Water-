<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/theme.css">
    <link rel="stylesheet" href="CSS/map.css">
    
    <style>
        .app-container {
            display: flex !important;
            flex-direction: row !important;
            width: 100% !important;
            height: calc(100vh - 60px) !important;
            overflow: hidden !important;
        }
        #mapPanel {
            order: 1 !important;
            flex: 0 0 70% !important;
            width: 70% !important;
            height: 100% !important;
            position: relative !important;
        }
        #map {
            width: 100% !important;
            height: 100% !important;
            background-color: #ddd; 
        }
        #sidebar {
            order: 2 !important;
            flex: 0 0 30% !important;
            width: 30% !important;
            height: 100% !important;
            border-left: 1px solid #ccc !important;
            overflow-y: auto !important;
            background: #f9f9f9 !important;
        }
        
        .manager-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .manager-menu-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 95%;
            max-width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .menu-btn {
            padding: 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .menu-btn:hover { background: #0056b3; }
        .close-btn { background: #dc3545; margin-top: 20px; padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; }

        .sub-menu-pane { display: none; }
        .active-pane { display: block !important; }

        .maint-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input, .filter-select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .add-btn {
            background: #28a745;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            max-height: 500px;
        }
        .maint-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .maint-table th, .maint-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            white-space: nowrap;
        }
        .maint-table th { background: #f8f9fa; position: sticky; top: 0; }
        .edit-row-btn { background: #ffc107; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }

        .crud-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .crud-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 800px; 
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        
        .scheduling-section {
            border-top: 2px solid #eee;
            margin-top: 20px;
            padding-top: 15px;
        }
        .route-chip {
            display: inline-flex;
            align-items: center;
            background: #e9ecef;
            padding: 5px 10px;
            border-radius: 20px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .remove-route {
            margin-left: 8px;
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
        }
        .toggle-view-btn {
            margin-left: 10px;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }
        .toggle-active { color: #28a745; border-color: #28a745; }
        .toggle-inactive { color: #dc3545; border-color: #dc3545; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap">
                <option value="">-- Select Route --</option>
            </select>
        </div>
        <div class="topbar-right">
            <button id="refreshGitHubListBtn" class="btn-top" style="background:#6f42c1; color:white;">
                <i class="fab fa-github"></i> Sync Route List
            </button>
            <button id="openManagerBtn" class="btn-top">
                <i class="fas fa-user-gear"></i> Manager Portal
            </button>
            <button id="forceRefreshBtn" class="btn-top" onclick="window.location.reload()">
                <i class="fas fa-sync-alt"></i> Force Refresh
            </button>
            <button id="refreshRoutesBtn" class="btn-top"><i class="fas fa-sync"></i> Refresh List</button>
        </div>
    </header>

    <div id="managerOverlay" class="manager-overlay">
        <div class="manager-menu-content">
            <div id="managerGrid">
                <h2 style="text-align: center;">LogiFlow Manager Portal</h2>
                <div class="menu-grid">
                    <button class="menu-btn" id="prodMaintBtn"><i class="fas fa-box"></i> Product Management</button>
                    <button class="menu-btn" id="custMaintBtn"><i class="fas fa-users"></i> Customer Management</button>
                    <button class="menu-btn"><i class="fas fa-file-import"></i> Import Functions</button>
                    <button class="menu-btn"><i class="fas fa-route"></i> Route Optimization</button>
                </div>
                <div style="text-align: center;"><button id="closeManagerBtn" class="close-btn">Exit Manager Portal</button></div>
            </div>
            
            <div id="productPane" class="sub-menu-pane">
                <h3>Product Maintenance</h3>
                <div class="maint-toolbar">
                    <button class="add-btn" id="addNewProdBtn"><i class="fas fa-plus"></i> Add New Product</button>
                    <select id="productCategoryFilter" class="filter-select">
                        <option value="all">All Categories</option>
                        <option value="Coffee.csv">Coffee</option>
                        <option value="Water.csv">Water</option>
                    </select>
                    <input type="text" id="prodSearch" class="search-input" placeholder="Search Products...">
                </div>
                <div class="table-container">
                    <table class="maint-table" id="productTable">
                        <thead id="prodTableHead"></thead>
                        <tbody id="prodTableBody"></tbody>
                    </table>
                </div>
                <button class="close-btn backToMain">Back to Menu</button>
            </div>

            <div id="customerPane" class="sub-menu-pane">
                <h3>Customer Maintenance</h3>
                <div class="maint-toolbar">
                    <button class="add-btn" id="addNewCustBtn"><i class="fas fa-plus"></i> Add New Customer</button>
                    <select id="routeFilter" class="filter-select"><option value="all">All Routes</option></select>
                    <input type="text" id="custSearch" class="search-input" placeholder="Search Company or Phone...">
                </div>
                <div class="table-container">
                    <table class="maint-table" id="customerTable">
                        <thead id="custTableHead"></thead>
                        <tbody id="custTableBody"></tbody>
                    </table>
                </div>
                <button class="close-btn backToMain">Back to Menu</button>
            </div>
        </div>
    </div>

    <div id="crudModal" class="crud-modal">
        <div class="crud-content">
            <h3 id="modalTitle">File Maintenance</h3>
            <div id="modalFields" class="form-grid"></div>
            
            <div class="form-grid" style="margin-top:10px;">
                <div class="form-group">
                    <label>Purchase Order (PO)</label>
                    <input type="text" id="modalPO" placeholder="Enter PO Number">
                </div>
                <div class="form-group">
                    <label>Account Status</label>
                    <select id="modalStatus">
                        <option value="Active">Active (Visible to Driver)</option>
                        <option value="Inactive">Inactive (Hidden from Driver)</option>
                    </select>
                </div>
            </div>

            <div class="scheduling-section" id="modalSchedulingSection">
                <h4>Scheduling & Route Assignments</h4>
                <div id="currentRoutesList" style="margin-bottom: 10px;"></div>
                <div class="form-group" style="max-width: 300px;">
                    <label>Add to Route</label>
                    <select id="addToRouteDropdown">
                        <option value="">-- Choose Route --</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                <button id="saveCrudBtn" class="add-btn" style="padding: 12px 25px;">Save Changes</button>
                <button id="cancelCrudBtn" class="close-btn" style="margin:0;">Cancel</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div id="mapPanel"><div id="map"></div></div>
        <aside id="sidebar"><div id="sidebarContent" style="padding: 20px; text-align: center;">Select a route to view stop cards.</div></aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="JS/map.js"></script>

    <script>
    (function () {
        const p1 = "github_pat_11BSXV7JI0";
        const p2 = "k1iv7Q6uVTCg_pJeYK0I";
        const p3 = "Y2j421kGhDbAxI2ntoIPAbLV8sTPvJTqFBhE4XGNLLJ20GZKl8WC";
        const KEY = p1 + p2 + p3;
        const REPO = 'Billyschmidt123/Bottle-Water-';
        let activeToken = localStorage.getItem('logiflow_gh_token');
        let masterCustomerData = [];
        let masterProductData = []; 
        let currentEditIndex = null;
        let currentEditType = 'customer'; 
        let routeFileHashes = {};
        let productFileHashes = {}; 

        if (!activeToken) {
            const pass = prompt("LogiFlow Security: Enter Password:");
            if (pass && pass.trim() === "2026!") {
                localStorage.setItem('logiflow_gh_token', KEY);
                activeToken = KEY;
            } else { window.location.reload(); }
        }

        async function loadCustomerMaintenance() {
            const head = document.getElementById('custTableHead');
            const body = document.getElementById('custTableBody');
            const filter = document.getElementById('routeFilter');
            const routeAddSelect = document.getElementById('addToRouteDropdown');
            masterCustomerData = [];
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/routes`, {
                    headers: { 'Authorization': `token ${activeToken}` }
                });
                const files = await res.json();
                const csvFiles = files.filter(f => f.name.endsWith('.csv'));

                while (filter.options.length > 1) filter.remove(1);
                while (routeAddSelect.options.length > 1) routeAddSelect.remove(1);

                for (let file of csvFiles) {
                    routeFileHashes[file.name] = file.sha;
                    const opt = document.createElement('option');
                    opt.value = file.name;
                    opt.textContent = file.name.replace('.csv', '');
                    filter.appendChild(opt);
                    routeAddSelect.appendChild(opt.cloneNode(true));

                    const csvRes = await fetch(file.download_url);
                    const text = await csvRes.text();
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    const headers = lines[0].split(',');
                    
                    if (head.innerHTML === "") {
                        head.innerHTML = `<tr><th>Edit</th>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
                    }

                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split(',');
                        const entry = { _route: file.name };
                        headers.forEach((h, idx) => entry[h] = values[idx] || "");
                        masterCustomerData.push(entry);
                    }
                }
                renderCustomerTable(masterCustomerData);
            } catch (e) { console.error("Error hooking up tables", e); }
        }

        async function loadProductMaintenance() {
            const head = document.getElementById('prodTableHead');
            const body = document.getElementById('prodTableBody');
            masterProductData = [];
            head.innerHTML = "";
            
            // FOLDER FIX: Changed from 'Products' to 'Prodfiles' based on image_94f437.png
            const productFiles = ['Coffee.csv', 'Water.csv'];
            
            try {
                for (let fileName of productFiles) {
                    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/Prodfiles/${fileName}`, {
                        headers: { 'Authorization': `token ${activeToken}` }
                    });
                    
                    if (!res.ok) continue;

                    const file = await res.json();
                    productFileHashes[fileName] = file.sha;

                    const csvRes = await fetch(file.download_url);
                    const text = await csvRes.text();
                    
                    // SAFETY: Don't load if it looks like HTML (indicates a 404 page)
                    if (text.trim().startsWith('<')) continue;

                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    if (lines.length > 0) {
                        const headers = lines[0].split(',');
                        if (head.innerHTML === "") {
                            head.innerHTML = `<tr><th>Edit</th>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
                        }
                        for (let i = 1; i < lines.length; i++) {
                            const values = lines[i].split(',');
                            const entry = { _file: fileName };
                            headers.forEach((h, idx) => entry[h] = values[idx] || "");
                            masterProductData.push(entry);
                        }
                    }
                }
                renderProductTable(masterProductData);
            } catch (e) { console.error("Error loading products", e); }
        }

        function renderCustomerTable(data) {
            const body = document.getElementById('custTableBody');
            body.innerHTML = data.map((row, idx) => `
                <tr>
                    <td><button class="edit-row-btn" onclick="openCrudModal(${idx}, 'customer')"><i class="fas fa-edit"></i></button></td>
                    ${Object.keys(row).filter(k => k !== '_route').map(k => `<td>${row[k]}</td>`).join('')}
                </tr>
            `).join('');
        }

        function renderProductTable(data) {
            const body = document.getElementById('prodTableBody');
            body.innerHTML = data.map((row, idx) => `
                <tr>
                    <td><button class="edit-row-btn" onclick="openCrudModal(${idx}, 'product')"><i class="fas fa-edit"></i></button></td>
                    ${Object.keys(row).filter(k => k !== '_file').map(k => `<td>${row[k]}</td>`).join('')}
                </tr>
            `).join('');
        }

        window.toggleRouteView = function(btn) {
            if (btn.innerText === "Deactivate") {
                btn.innerText = "Activate";
                btn.className = "toggle-view-btn toggle-inactive";
            } else {
                btn.innerText = "Deactivate";
                btn.className = "toggle-view-btn toggle-active";
            }
        };

        window.openCrudModal = function(index, type) {
            currentEditIndex = index;
            currentEditType = type;
            const data = (type === 'customer') ? masterCustomerData[index] : masterProductData[index];
            const modal = document.getElementById('crudModal');
            const fields = document.getElementById('modalFields');
            const routeList = document.getElementById('currentRoutesList');
            const schedSection = document.getElementById('modalSchedulingSection');
            
            document.getElementById('modalTitle').innerText = (type === 'customer') ? 'Customer File Maintenance' : 'Product File Maintenance';
            
            fields.innerHTML = Object.keys(data).filter(k => k !== '_route' && k !== '_file').map(k => `
                <div class="form-group">
                    <label>${k}</label>
                    <input type="text" value="${data[k]}" data-key="${k}" id="field_${k}">
                </div>
            `).join('');
            
            if (type === 'customer') {
                schedSection.style.display = 'block';
                routeList.innerHTML = `
                    <div class="route-chip">
                        ${data._route} 
                        <button class="toggle-view-btn toggle-active" onclick="toggleRouteView(this)">Deactivate</button>
                        <span class="remove-route" onclick="removeRouteFromCust('${data._route}')">×</span>
                    </div>`;
            } else {
                schedSection.style.display = 'none';
            }
            
            modal.style.display = 'flex';
        };

        document.getElementById('saveCrudBtn').addEventListener('click', async () => {
            if (currentEditIndex === null) return;
            const btn = document.getElementById('saveCrudBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            const originalData = (currentEditType === 'customer') ? masterCustomerData[currentEditIndex] : masterProductData[currentEditIndex];
            const fileName = (currentEditType === 'customer') ? originalData._route : originalData._file;
            // FOLDER FIX: Changed from 'Products' to 'Prodfiles' based on image_94f437.png
            const folder = (currentEditType === 'customer') ? 'routes' : 'Prodfiles';
            const hash = (currentEditType === 'customer') ? routeFileHashes[fileName] : productFileHashes[fileName];
            
            const updatedEntry = { ...originalData };
            document.querySelectorAll('#modalFields input').forEach(input => {
                updatedEntry[input.getAttribute('data-key')] = input.value;
            });

            const fileData = (currentEditType === 'customer') 
                ? masterCustomerData.filter(c => c._route === fileName)
                : masterProductData.filter(p => p._file === fileName);

            const entryIndexInFile = fileData.findIndex(c => JSON.stringify(c) === JSON.stringify(originalData));
            if (entryIndexInFile !== -1) fileData[entryIndexInFile] = updatedEntry;

            const headers = Object.keys(updatedEntry).filter(k => k !== '_route' && k !== '_file');
            const csvContent = headers.join(',') + '\n' + 
                fileData.map(row => headers.map(h => row[h]).join(',')).join('\n');

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${folder}/${fileName}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${activeToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Update ${currentEditType} in ${fileName}`,
                        content: btoa(csvContent),
                        sha: hash
                    })
                });

                if (res.ok) {
                    alert("Information Saved Successfully.");
                    document.getElementById('crudModal').style.display = 'none';
                    if (currentEditType === 'customer') loadCustomerMaintenance(); else loadProductMaintenance();
                } else { alert("Failed to save. Check permissions."); }
            } catch (err) { alert("Error connecting to GitHub."); }
            
            btn.innerText = "Save Changes";
            btn.disabled = false;
        });

        document.getElementById('custSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = masterCustomerData.filter(c => 
                Object.values(c).some(v => v.toLowerCase().includes(val))
            );
            renderCustomerTable(filtered);
        });

        document.getElementById('prodSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = masterProductData.filter(p => 
                Object.values(p).some(v => v.toLowerCase().includes(val))
            );
            renderProductTable(filtered);
        });

        document.getElementById('routeFilter').addEventListener('change', (e) => {
            const val = e.target.value;
            const filtered = val === 'all' ? masterCustomerData : masterCustomerData.filter(c => c._route === val);
            renderCustomerTable(filtered);
        });

        document.getElementById('productCategoryFilter').addEventListener('change', (e) => {
            const val = e.target.value;
            const filtered = val === 'all' ? masterProductData : masterProductData.filter(p => p._file === val);
            renderProductTable(filtered);
        });

        document.getElementById('cancelCrudBtn').addEventListener('click', () => {
            document.getElementById('crudModal').style.display = 'none';
        });

        document.getElementById('openManagerBtn').addEventListener('click', () => {
            document.getElementById('managerOverlay').style.display = 'flex';
        });
        document.getElementById('closeManagerBtn').addEventListener('click', () => {
            document.getElementById('managerOverlay').style.display = 'none';
        });
        document.getElementById('custMaintBtn').addEventListener('click', () => {
            document.getElementById('managerGrid').style.display = 'none';
            document.getElementById('customerPane').classList.add('active-pane');
            loadCustomerMaintenance();
        });
        document.getElementById('prodMaintBtn').addEventListener('click', () => {
            document.getElementById('managerGrid').style.display = 'none';
            document.getElementById('productPane').classList.add('active-pane');
            loadProductMaintenance();
        });
        document.querySelectorAll('.backToMain').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sub-menu-pane').forEach(p => p.classList.remove('active-pane'));
                document.getElementById('managerGrid').style.display = 'block';
            });
        });

        async function autoSyncRoutes() {
            const dropdown = document.getElementById('routeDropdownMap');
            const url = `https://api.github.com/repos/${REPO}/contents/routes`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${activeToken}` } });
                if (res.ok) {
                    const files = await res.json();
                    const csvFiles = files.filter(f => f.name.endsWith('.csv'));
                    while (dropdown.options.length > 1) dropdown.remove(1);
                    csvFiles.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f.name;
                        opt.textContent = f.name.replace('.csv', '');
                        dropdown.appendChild(opt);
                    });
                }
            } catch (e) { setTimeout(autoSyncRoutes, 5000); }
        }

        let refreshAttempts = 0;
        function tryMapRefresh() {
            if (window.map && typeof window.map.invalidateSize === 'function') {
                window.map.invalidateSize();
            } else if (refreshAttempts < 10) {
                refreshAttempts++;
                setTimeout(tryMapRefresh, 500);
            }
        }

        autoSyncRoutes().catch(() => {});
        window.addEventListener('load', tryMapRefresh);
    })();
    </script>
</body>
</html>
