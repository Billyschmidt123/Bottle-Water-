<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <meta name="theme-color" content="#007bff">

    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="ASSETS/LEAFLET/leaflet.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/main.css?v=1">
    <link rel="stylesheet" href="CSS/theme.css?v=1">
    <link rel="stylesheet" href="CSS/map.css?v=1">
    <link rel="stylesheet" href="CSS/modal.css?v=1">
    <link rel="stylesheet" href="CSS/manager.css?v=1">
    
    <style>
        #uploadProgressContainer { width: 100%; background: #eee; border-radius: 5px; margin: 10px 0; display: none; }
        #uploadProgressBar { width: 0%; height: 20px; background: #28a745; border-radius: 5px; text-align: center; color: white; line-height: 20px; font-size: 12px; transition: width 0.3s; }
        .github-refresh-btn { background: #6f42c1 !important; color: white !important; }
        #routeDropdownMap { margin-left:15px; padding:6px; border-radius:4px; border:1px solid #ccc; width: 200px; }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap">
                <option value="">-- Select Route --</option>
            </select>
        </div>
        <div class="topbar-right">
            <button id="refreshGitHubListBtn" class="btn-top github-refresh-btn">
                <i class="fab fa-github"></i> Sync Route List
            </button>
            <button class="btn-top openManagerBtn">
                <i class="fas fa-user-gear"></i> Manager Portal
            </button>
            <button id="refreshRoutesBtn" class="btn-top">
                <i class="fas fa-sync"></i> Force Refresh
            </button>
        </div>
    </header>

    <div class="app-container">
        <div id="uploadProgressContainer">
            <div id="uploadProgressBar">0%</div>
        </div>
        <div id="mapPanel">
            <div id="mapTopBar">
                <div id="currentStopInfo">No stop selected</div>
                <div id="mapControlButtons">
                    <button id="btnPrevStop" class="btn-top btn-small"><i class="fas fa-arrow-left"></i> Back</button>
                    <button id="btnNextStop" class="btn-top btn-small">Forward <i class="fas fa-arrow-right"></i></button>
                    <button id="btnStartRoute" class="btn-top btn-small btn-success"><i class="fas fa-play"></i> Start</button>
                    <button id="btnFinishRoute" class="btn-top btn-small btn-warning"><i class="fas fa-flag-checkered"></i> Finish</button>
                </div>
            </div>
            <div id="map" style="height: 600px;"></div>
        </div>
        <aside id="sidebar">
            <div id="sidebarContent">
                <div style="padding: 20px; text-align: center; color: #666;">System Initializing...</div>
            </div>
        </aside>
    </div>

    <div id="fullPageOverlay"></div>
    <div id="productOverlay"></div>
    <div id="mgmtModal"><div class="modal-content" id="modalBody"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="JS/loader.js?v=1"></script>

    <script>
    (function () {
        // Simple XOR decoder
        const decodeToken = (encoded, key) => {
            try {
                return atob(encoded).split('').map((char, i) => 
                    String.fromCharCode(char.charCodeAt(0) ^ key.charCodeAt(i % key.length))
                ).join('');
            } catch(e) { return null; }
        };

        // Your specific scrambled token
        const SCRAMBLED = "V1tbS08ZFlFVAhZfUFBZVFRfVlxOEQoNCF5SWFBfXF9eVFRZVF1UWFtfWVhRXl1N"; 
        
        let activeToken = localStorage.getItem('logiflow_gh_token');
        
        // Force the prompt if no token is saved
        if (!activeToken || activeToken === "null" || activeToken === "undefined") {
            const driverPass = prompt("LogiFlow Security: Enter Route Access Password:");
            
            // Clean the input to remove accidental spaces
            const cleanPass = (driverPass || "").trim();

            if (cleanPass === "2026!") {
                const result = decodeToken(SCRAMBLED, "2026!");
                if (result && result.startsWith("github_pat")) {
                    localStorage.setItem('logiflow_gh_token', result);
                    activeToken = result;
                } else {
                    alert("System Error: Failed to unlock the key. Contact Admin.");
                }
            } else if (driverPass !== null) {
                alert("Incorrect password. Please try again.");
                window.location.reload(); // Refresh to try again
            }
        }

        const GITHUB_CONFIG = {
            TOKEN: activeToken, 
            REPO: 'Billyschmidt123/Bottle-Water-',
            BASE_RAW: 'https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/'
        };

        // Standard fetch wrapper
        async function safeFetch(url, options = {}) {
            if (!GITHUB_CONFIG.TOKEN) return null;
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: { 
                        ...(options.headers || {}),
                        'Authorization': `token ${GITHUB_CONFIG.TOKEN}`
                    }
                });
                return response;
            } catch (e) { return null; }
        }

        // CSV to Stop Card Logic
        function parseCSVToStopCards(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (!lines.length) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const card = {};
                headers.forEach((h, i) => {
                    card[h] = (values[i] || '').trim();
                });
                return card;
            });
        }

        window.refreshRoutesFromGitHub = async function() {
            try {
                const res = await safeFetch(GITHUB_CONFIG.BASE_RAW + 'routes/routes-manifest.json?cb=' + Date.now());
                if (res && res.ok) {
                    const manifest = await res.json();
                    populateRouteDropdown(manifest.routes);
                }
            } catch (e) { console.warn("List sync failed."); }
        };

        document.getElementById('routeDropdownMap').addEventListener('change', async (e) => {
            const fileName = e.target.value;
            if (!fileName) return;

            const sidebar = document.getElementById('sidebarContent');
            sidebar.innerHTML = '<div style="padding: 20px;">Loading Stop Cards...</div>';

            const res = await safeFetch(GITHUB_CONFIG.BASE_RAW + 'routes/' + fileName + '?cb=' + Date.now());
            if (res && res.ok) {
                const csvText = await res.text();
                const stopCards = parseCSVToStopCards(csvText);
                sidebar.innerHTML = `<div style="padding: 20px;">Loaded ${stopCards.length} stop cards.</div>`;
            }
        });

        window.syncRouteListFromGitHubDir = async function() {
            const API_URL = `https://api.github.com/repos/${GITHUB_CONFIG.REPO}/contents/routes`;
            try {
                const res = await safeFetch(API_URL);
                if (!res || !res.ok) throw new Error("GitHub Connection Failed.");

                const data = await res.json();
                const csvFiles = data.filter(f => f.name.endsWith('.csv')).map(f => ({
                    id: f.name.replace('.csv', ''),
                    name: f.name.replace('.csv', ''),
                    file: f.name
                }));

                const manifest = { updatedAt: new Date().toISOString(), routes: csvFiles };
                await pushManifestToGitHub(manifest);
                await window.refreshRoutesFromGitHub();
                alert(`Success: Found ${csvFiles.length} routes.`);
            } catch (e) { alert("Sync Error: " + e.message); }
        };

        async function pushManifestToGitHub(manifest) {
            const path = 'routes/routes-manifest.json';
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.REPO}/contents/${path}`;
            const getRes = await safeFetch(url);
            const sha = getRes && getRes.ok ? (await getRes.json()).sha : null;

            await fetch(url, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    message: "Logiflow: Syncing Routes",
                    content: btoa(JSON.stringify(manifest, null, 2)),
                    sha: sha
                })
            });
        }

        function populateRouteDropdown(routes) {
            const dropdown = document.querySelector('#routeDropdownMap');
            if (!dropdown) return;
            while (dropdown.options.length > 1) dropdown.remove(1);
            routes.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.file;
                opt.textContent = r.name;
                dropdown.appendChild(opt);
            });
        }

        document.getElementById('refreshGitHubListBtn').addEventListener('click', window.syncRouteListFromGitHubDir);
        document.getElementById('refreshRoutesBtn').addEventListener('click', window.refreshRoutesFromGitHub);

        // Run on startup
        window.refreshRoutesFromGitHub();
    })();
    </script>
</body>
</html>
