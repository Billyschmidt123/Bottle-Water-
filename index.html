<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <!-- RELIABLE LEAFLET LINKS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/theme.css">
    <link rel="stylesheet" href="CSS/map.css">
    
    <style>
        /* 70/30 SPLIT (Matches image_973a0e.png) */
        .app-container {
            display: flex !important;
            flex-direction: row !important;
            width: 100% !important;
            height: calc(100vh - 60px) !important;
            overflow: hidden !important;
        }
        #mapPanel {
            order: 1 !important;
            flex: 0 0 70% !important;
            width: 70% !important;
            height: 100% !important;
            position: relative !important;
        }
        #map {
            width: 100% !important;
            height: 100% !important;
            background-color: #ddd; 
        }
        #sidebar {
            order: 2 !important;
            flex: 0 0 30% !important;
            width: 30% !important;
            height: 100% !important;
            border-left: 1px solid #ccc !important;
            overflow-y: auto !important;
            background: #f9f9f9 !important;
        }
        
        /* MANAGER OVERLAY STYLES */
        .manager-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .manager-menu-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .menu-btn {
            padding: 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .menu-btn:hover { background: #0056b3; }
        .close-btn { background: #dc3545; margin-top: 20px; padding: 10px 20px; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap">
                <option value="">-- Select Route --</option>
            </select>
        </div>
        <div class="topbar-right">
            <button id="refreshGitHubListBtn" class="btn-top" style="background:#6f42c1; color:white;">
                <i class="fab fa-github"></i> Sync Route List
            </button>
            <button id="openManagerBtn" class="btn-top">
                <i class="fas fa-user-gear"></i> Manager Portal
            </button>
            <button id="forceRefreshBtn" class="btn-top" onclick="window.location.reload()">
                <i class="fas fa-sync-alt"></i> Force Refresh
            </button>
            <button id="refreshRoutesBtn" class="btn-top"><i class="fas fa-sync"></i> Refresh List</button>
        </div>
    </header>

    <!-- MANAGER MENU PAGE / OVERLAY -->
    <div id="managerOverlay" class="manager-overlay">
        <div class="manager-menu-content">
            <h2>LogiFlow Manager Portal</h2>
            <div class="menu-grid">
                <button class="menu-btn"><i class="fas fa-box"></i> Product Management</button>
                <button class="menu-btn"><i class="fas fa-users"></i> Customer Management</button>
                <button class="menu-btn"><i class="fas fa-file-import"></i> Import Functions</button>
                <button class="menu-btn"><i class="fas fa-route"></i> Route Optimization</button>
            </div>
            <button id="closeManagerBtn" class="close-btn">Exit Manager Portal</button>
        </div>
    </div>

    <div class="app-container">
        <div id="mapPanel">
            <div id="map"></div>
        </div>
        <aside id="sidebar">
            <div id="sidebarContent" style="padding: 20px; text-align: center; color: #666;">
                Select a route to view stop cards.
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="JS/map.js"></script>

    <script>
    (function () {
        const p1 = "github_pat_11BSXV7JI0";
        const p2 = "k1iv7Q6uVTCg_pJeYK0I";
        const p3 = "Y2j421kGhDbAxI2ntoIPAbLV8sTPvJTqFBhE4XGNLLJ20GZKl8WC";
        const KEY = p1 + p2 + p3;
        const REPO = 'Billyschmidt123/Bottle-Water-';

        let activeToken = localStorage.getItem('logiflow_gh_token');

        if (!activeToken) {
            const pass = prompt("LogiFlow Security: Enter Password:");
            if (pass && pass.trim() === "2026!") {
                localStorage.setItem('logiflow_gh_token', KEY);
                activeToken = KEY;
            } else { window.location.reload(); }
        }

        // MANAGER MENU TOGGLE LOGIC
        const overlay = document.getElementById('managerOverlay');
        document.getElementById('openManagerBtn').addEventListener('click', () => {
            overlay.style.display = 'flex';
        });
        document.getElementById('closeManagerBtn').addEventListener('click', () => {
            overlay.style.display = 'none';
        });

        async function autoSyncRoutes() {
            const dropdown = document.getElementById('routeDropdownMap');
            const url = `https://api.github.com/repos/${REPO}/contents/routes`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${activeToken}` } });
                if (res.ok) {
                    const files = await res.json();
                    const csvFiles = files.filter(f => f.name.endsWith('.csv'));
                    while (dropdown.options.length > 1) dropdown.remove(1);
                    csvFiles.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f.name;
                        opt.textContent = f.name.replace('.csv', '');
                        dropdown.appendChild(opt);
                    });
                }
            } catch (e) { setTimeout(autoSyncRoutes, 5000); }
        }

        let refreshAttempts = 0;
        function tryMapRefresh() {
            if (window.map && typeof window.map.invalidateSize === 'function') {
                window.map.invalidateSize();
            } else if (refreshAttempts < 10) {
                refreshAttempts++;
                setTimeout(tryMapRefresh, 500);
            }
        }

        document.getElementById('routeDropdownMap').addEventListener('change', async (e) => {
            const file = e.target.value;
            if (!file) return;
            const sidebar = document.getElementById('sidebarContent');
            sidebar.innerHTML = 'Loading stop cards...';
            const url = `https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/routes/${file}`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${activeToken}` } });
                if (res.ok) {
                    const text = await res.text();
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    sidebar.innerHTML = `<div style="padding:15px;"><b>Route:</b> ${file}<br><b>Stops:</b> ${lines.length - 1}</div>`;
                }
            } catch (err) { sidebar.innerHTML = 'Error loading cards.'; }
        });

        document.getElementById('refreshRoutesBtn').addEventListener('click', autoSyncRoutes);
        const syncBtn = document.getElementById('refreshGitHubListBtn');
        if(syncBtn) { syncBtn.addEventListener('click', autoSyncRoutes); }

        autoSyncRoutes().catch(() => {});
        window.addEventListener('load', tryMapRefresh);
    })();
    </script>
</body>
</html>
