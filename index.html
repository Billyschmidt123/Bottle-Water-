<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <link rel="stylesheet" href="ASSETS/LEAFLET/leaflet.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/main.css?v=1">
    <style>
        .github-refresh-btn { background: #6f42c1 !important; color: white !important; }
        .btn-top { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #routeDropdownMap { padding: 8px; border-radius: 4px; width: 200px; }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap">
                <option value="">-- Select Route --</option>
            </select>
        </div>
        <div class="topbar-right">
            <button id="refreshGitHubListBtn" class="btn-top github-refresh-btn">
                <i class="fab fa-github"></i> Sync Route List
            </button>
            <button id="refreshRoutesBtn" class="btn-top">
                <i class="fas fa-sync"></i> Force Refresh
            </button>
        </div>
    </header>

    <div id="map" style="height: 500px; background: #eee; margin: 10px; border-radius: 8px;"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function () {
        const GITHUB_CONFIG = {
            TOKEN: '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',
            REPO: 'Billyschmidt123/Bottle-Water-',
            BASE_RAW: 'https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/'
        };

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (!lines.length) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((h, i) => {
                    // Update label to delivery slip
                    let key = (h.toLowerCase() === 'slip / po' || h.toLowerCase() === 'slip/po') ? 'delivery slip' : h;
                    obj[key] = (values[i] || '').trim();
                });
                return obj;
            });
        }

        window.refreshRoutesFromGitHub = async function() {
            try {
                const res = await fetch(GITHUB_CONFIG.BASE_RAW + 'routes/routes-manifest.json?cb=' + Date.now());
                
                // If manifest is missing (404), trigger a sync to build it
                if (res.status === 404) {
                    console.log("Manifest missing. Attempting to rebuild from repository...");
                    return await window.syncRouteListFromGitHubDir();
                }

                const manifest = await res.json();
                if (!manifest.routes) return;

                const routePromises = manifest.routes.map(async r => {
                    try {
                        const csvRes = await fetch(GITHUB_CONFIG.BASE_RAW + 'routes/' + r.file + '?cb=' + Date.now());
                        const csvText = await csvRes.text();
                        return { ...r, stops: parseCSV(csvText) };
                    } catch (err) { return null; }
                });

                const updatedRoutes = (await Promise.all(routePromises)).filter(r => r !== null);
                window.logiflowRouteCache = { routes: updatedRoutes, updatedAt: new Date().toISOString() };
                localStorage.setItem('logiflowRouteCache_v1', JSON.stringify(window.logiflowRouteCache));
                
                populateRouteDropdown(updatedRoutes);
            } catch (e) {
                console.error("Master Sync Failed:", e.message);
            }
        };

        window.syncRouteListFromGitHubDir = async function() {
            const API_URL = `https://api.github.com/repos/${GITHUB_CONFIG.REPO}/contents/routes`;
            try {
                const res = await fetch(API_URL, {
                    headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}` }
                });

                if (res.status === 401) {
                    throw new Error("GitHub Security Key (Token) is invalid or expired.");
                }

                const data = await res.json();
                if (!Array.isArray(data)) throw new Error("Could not find the 'routes' folder.");

                const csvFiles = data.filter(f => f.name.endsWith('.csv')).map(f => ({
                    id: f.name.replace('.csv', ''),
                    name: f.name.replace('.csv', ''),
                    file: f.name
                }));

                const manifest = { updatedAt: new Date().toISOString(), routes: csvFiles };
                
                // Save the new manifest back to GitHub so 404s stop happening
                await pushManifestToGitHub(manifest);
                
                // Load the data from the newly found files
                await window.refreshRoutesFromGitHub();
                
                alert(`Sync Successful: ${csvFiles.length} routes found and manifest updated.`);
            } catch (e) {
                alert("Connection Error: " + e.message);
            }
        };

        async function pushManifestToGitHub(manifest) {
            const path = 'routes/routes-manifest.json';
            const url = `https://api.github.com/repos/${GITHUB_CONFIG.REPO}/contents/${path}`;
            
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}` } });
                const sha = getRes.ok ? (await getRes.json()).sha : null;

                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "System Auto-Sync: Updating Route Manifest",
                        content: btoa(JSON.stringify(manifest, null, 2)),
                        sha: sha
                    })
                });
            } catch (e) { console.error("Manifest Push Failed:", e); }
        }

        function populateRouteDropdown(routes) {
            const dropdown = document.querySelector('#routeDropdownMap');
            if (!dropdown) return;
            while (dropdown.options.length > 1) dropdown.remove(1);
            routes.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.file;
                opt.textContent = r.name;
                dropdown.appendChild(opt);
            });
        }

        document.getElementById('refreshGitHubListBtn').addEventListener('click', () => window.syncRouteListFromGitHubDir());
        document.getElementById('refreshRoutesBtn').addEventListener('click', () => window.refreshRoutesFromGitHub());

        // Run startup sync
        window.refreshRoutesFromGitHub();
    })();
    </script>
</body>
</html>
