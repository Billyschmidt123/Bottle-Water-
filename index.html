<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <meta name="theme-color" content="#007bff">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="ASSETS/LEAFLET/leaflet.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="CSS/main.css?v=1">
    <link rel="stylesheet" href="CSS/theme.css?v=1">
    <link rel="stylesheet" href="CSS/map.css?v=1">
    <link rel="stylesheet" href="CSS/modal.css?v=1">
    <link rel="stylesheet" href="CSS/manager.css?v=1">
    <style>
        #uploadProgressContainer { width: 100%; background: #eee; border-radius: 5px; margin: 10px 0; display: none; }
        #uploadProgressBar { width: 0%; height: 20px; background: #28a745; border-radius: 5px; text-align: center; color: white; line-height: 20px; font-size: 12px; transition: width 0.3s; }
        .local-upload-btn { background: #28a745 !important; color: white !important; }
        .github-refresh-btn { background: #6f42c1 !important; color: white !important; }
        
        /* NEW CUSTOMER MANAGEMENT STYLES */
        .mgmt-table-container { width: 100%; overflow-x: auto; margin-top: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .mgmt-table { width: 100%; border-collapse: collapse; min-width: 800px; }
        .mgmt-table th, .mgmt-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .mgmt-table th { background: #f8f9fa; position: sticky; top: 0; }
        .status-pill { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-active { background: #d4edda; color: #155724; }
        .status-inactive { background: #f8d7da; color: #721c24; }
        .mgmt-actions button { margin-right: 5px; padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-toggle { background: #17a2b8; color: #fff; }
        .btn-delete { background: #dc3545; color: #fff; }
    </style>
</head>

<body>

    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap" style="margin-left:15px; padding:6px; border-radius:4px; border:1px solid #ccc;">
                <option value="">-- Select Route --</option>
            </select>
        </div>

        <div class="topbar-right">
            <input type="file" id="localFileImporter" multiple accept=".csv" style="display:none;">
            
            <button id="refreshGitHubListBtn" class="btn-top github-refresh-btn">
                <i class="fab fa-github"></i> Refresh Route List
            </button>

            <button class="btn-top local-upload-btn" onclick="document.getElementById('localFileImporter').click()">
                <i class="fas fa-file-import"></i> Import From Local Drive
            </button>

            <button class="btn-top openManagerBtn">
                <i class="fas fa-user-gear"></i> Manager Portal
            </button>

            <button id="refreshRoutesBtn" class="btn-top">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>
    </header>

    <div class="app-container">
        <div id="uploadProgressContainer" style="position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 300px; z-index: 9999;">
            <div id="uploadProgressBar">0%</div>
        </div>

        <div id="mapPanel">
            <div id="mapTopBar">
                <div id="currentStopInfo">No stop selected</div>
                <div id="mapControlButtons">
                    <button id="btnPrevStop" class="btn-top btn-small"><i class="fas fa-arrow-left"></i> Back</button>
                    <button id="btnNextStop" class="btn-top btn-small">Forward <i class="fas fa-arrow-right"></i></button>
                    <button id="btnStartRoute" class="btn-top btn-small btn-success"><i class="fas fa-play"></i> Start</button>
                    <button id="btnFinishRoute" class="btn-top btn-small btn-warning"><i class="fas fa-flag-checkered"></i> Finish</button>
                    <button id="btnDirections" class="btn-top btn-small"><i class="fas fa-route"></i> Directions</button>
                </div>
            </div>
            <div id="map"></div>
        </div>

        <aside id="sidebar">
            <div id="sidebarContent">
                <div style="padding: 20px; text-align: center; color: #666;">
                    Select a route to view delivery details.
                </div>
            </div>
        </aside>
    </div>

    <div id="modalContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="JS/loader.js?v=1"></script>

    <script>
    (function () {
        const ROUTE_CACHE_KEY = 'logiflowRouteCache_v1';

        window.loadModule = function (moduleName) {
            const container = document.getElementById('sidebarContent');
            if (!container) return;

            const url = 'MODULES/' + moduleName + '.html';
            fetch(url + '?cb=' + Date.now())
                .then(res => {
                    if (!res.ok) throw new Error('Module load failed');
                    return res.text();
                })
                .then(html => {
                    container.innerHTML = html;
                    const temp = document.createElement('div');
                    temp.innerHTML = html;
                    temp.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) newScript.src = oldScript.src;
                        else newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    });
                    
                    if (window.logiflowRouteCache) {
                        populateRouteDropdown(window.logiflowRouteCache.routes);
                    }
                })
                .catch(err => console.error(err));
        };

        function initManagerButtons() {
            document.querySelectorAll('.openManagerBtn').forEach(btn => {
                if (!btn.__bound) {
                    btn.addEventListener('click', () => window.loadModule('manager-portal'));
                    btn.__bound = true;
                }
            });
        }

        function parseCSV(text) {
            if (!text) return [];
            const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const parts = line.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = (parts[i] || '').trim());
                return obj;
            });
        }

        function populateRouteDropdown(routes) {
            if (!Array.isArray(routes)) return;
            const selectors = ['#routeDropdownMap', '#routeDropdown'];
            const dayOrder = { "monday": 1, "tuesday": 2, "wednesday": 3, "thursday": 4, "friday": 5, "saturday": 6, "sunday": 7 };
            
            const sortedRoutes = [...routes].sort((a, b) => {
                const nameA = (a.name || "").toLowerCase();
                const nameB = (b.name || "").toLowerCase();
                const weekA = parseInt((nameA.match(/week\s*(\d+)/) || [0, 0])[1]);
                const weekB = parseInt((nameB.match(/week\s*(\d+)/) || [0, 0])[1]);
                if (weekA !== weekB) return weekA - weekB;
                let dayA = 0; let dayB = 0;
                Object.keys(dayOrder).forEach(d => { if(nameA.includes(d)) dayA = dayOrder[d]; });
                Object.keys(dayOrder).forEach(d => { if(nameB.includes(d)) dayB = dayOrder[d]; });
                return dayA - dayB || nameA.localeCompare(nameB);
            });

            selectors.forEach(selector => {
                const dropdown = document.querySelector(selector);
                if (!dropdown) return;
                while (dropdown.options.length > 1) dropdown.remove(1);
                sortedRoutes.forEach(route => {
                    const opt = document.createElement('option');
                    opt.value = route.file || route.id || route.name;
                    opt.textContent = route.name || route.id;
                    dropdown.appendChild(opt);
                });
            });
        }

        window.refreshRoutesFromGitHub = function() {
            const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/';
            const manifestPath = 'routes/routes-manifest.json';

            return fetch(GITHUB_RAW_BASE + manifestPath + '?cb=' + Date.now())
                .then(res => {
                    if (!res.ok) return { routes: [] };
                    return res.json();
                })
                .then(manifest => {
                    if (!manifest.routes || manifest.routes.length === 0) return [];
                    const promises = manifest.routes.map(r => {
                        const targetPath = 'routes/' + r.file;
                        return fetch(GITHUB_RAW_BASE + targetPath + '?cb=' + Date.now())
                            .then(res => res.ok ? res.text() : null)
                            .then(csv => csv ? ({ ...r, stops: parseCSV(csv) }) : null)
                            .catch(() => null);
                    });
                    return Promise.all(promises);
                })
                .then(results => {
                    const safeResults = Array.isArray(results) ? results : [];
                    const routes = safeResults.filter(r => r !== null);
                    if (routes.length > 0) {
                        const cache = { routes: routes, updatedAt: new Date().toISOString() };
                        localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cache));
                        window.logiflowRouteCache = cache;
                        populateRouteDropdown(routes);
                    }
                    return safeResults;
                });
        };

        window.syncRouteListFromGitHubDir = async function() {
            const GITHUB_REPO = 'Billyschmidt123/Bottle-Water-';
            const DIR_PATH = 'routes';
            const API_URL = `https://api.github.com/repos/${GITHUB_REPO}/contents/${DIR_PATH}`;
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Folder access failed.");
                const files = await res.json();
                const csvFiles = files.filter(f => f.name.endsWith('.csv')).map(f => ({
                    id: f.name.replace('.csv', ''),
                    name: f.name.replace('.csv', ''),
                    file: f.name
                }));
                if (csvFiles.length === 0) return alert("No CSVs found.");
                
                const routelist = { updatedAt: new Date().toISOString(), routes: csvFiles };
                await window.pushRouteListToGitHub(routelist);
                await window.refreshRoutesFromGitHub();
                alert(`Synced ${csvFiles.length} routes from GitHub directory.`);
            } catch (e) { alert("Sync Error: " + e.message); }
        };

        function initRouteSystem() {
            let cached = (function(){ try { return JSON.parse(localStorage.getItem(ROUTE_CACHE_KEY)); } catch(e){return null;}})();
            if (cached) {
                window.logiflowRouteCache = cached;
                populateRouteDropdown(cached.routes);
            }
            window.refreshRoutesFromGitHub().catch(() => {});
            document.getElementById('refreshGitHubListBtn').addEventListener('click', () => window.syncRouteListFromGitHubDir());
        }

        window.pushRouteListToGitHub = async function(routelist) {
            const GITHUB_TOKEN = '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';
            const GITHUB_REPO = 'Billyschmidt123/Bottle-Water-';
            const FILE_PATH = 'routes/routes-manifest.json';
            try {
                const getRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                let sha = getRes.ok ? (await getRes.json()).sha : null;
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Update route manifest",
                        content: btoa(JSON.stringify(routelist, null, 2)),
                        sha: sha
                    })
                });
            } catch(e) { console.error("GitHub push failed"); }
        };

        document.getElementById('localFileImporter').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const progressContainer = document.getElementById('uploadProgressContainer');
            const progressBar = document.getElementById('uploadProgressBar');
            progressContainer.style.display = 'block';

            let routes = [];
            let processedCount = 0;

            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const stops = parseCSV(event.target.result);
                    routes.push({ id: file.name.replace('.csv', ''), name: file.name.replace('.csv', ''), file: file.name, stops: stops });
                    processedCount++;
                    progressBar.style.width = Math.round((processedCount / files.length) * 100) + '%';

                    if (processedCount === files.length) {
                        const cache = { routes: routes, updatedAt: new Date().toISOString() };
                        localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cache));
                        window.logiflowRouteCache = cache;
                        populateRouteDropdown(routes);
                        
                        progressContainer.style.display = 'none';

                        const confirmSync = confirm(`Loaded ${files.length} routes. Generate Route List JSON and sync to GitHub?`);
                        if (confirmSync) {
                            const routelist = { updatedAt: new Date().toISOString(), routes: routes.map(r => ({ id: r.id, name: r.name, file: r.file })) };
                            window.pushRouteListToGitHub(routelist).then(() => {
                                alert("Success: Route List created and synced.");
                            });
                        }
                    }
                };
                reader.readAsText(file);
            });
        });

        // --- NEW ADDITIONS START HERE: CUSTOMER MANAGEMENT FUNCTIONALITY ---

        window.openCustomerManagement = function() {
            const container = document.getElementById('sidebarContent');
            if (!container) return;

            if (!window.logiflowRouteCache || !window.logiflowRouteCache.routes) {
                alert("No route data found. Please import routes first.");
                return;
            }

            let allStops = [];
            let headers = [];

            // Extract all stops and find headers from the first valid stop
            window.logiflowRouteCache.routes.forEach(route => {
                if (route.stops && Array.isArray(route.stops)) {
                    route.stops.forEach((stop, index) => {
                        if (headers.length === 0) headers = Object.keys(stop);
                        // Store route info so we know where to save changes
                        allStops.push({ ...stop, _routeId: route.id, _localIndex: index });
                    });
                }
            });

            let html = `
                <div style="padding:15px;">
                    <h2>Customer Management</h2>
                    <button class="btn-top" onclick="window.loadModule('manager-portal')">Back to Manager</button>
                    <button class="btn-top btn-success" onclick="window.customerCRUD('create')">Add New Customer</button>
                    
                    <div class="mgmt-table-container">
                        <table class="mgmt-table">
                            <thead>
                                <tr>
                                    ${headers.map(h => `<th>${h}</th>`).join('')}
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${allStops.map((stop, globalIndex) => {
                                    const isActive = stop.Status !== 'Inactive';
                                    return `
                                        <tr>
                                            ${headers.map(h => `<td>${stop[h] || ''}</td>`).join('')}
                                            <td>
                                                <span class="status-pill ${isActive ? 'status-active' : 'status-inactive'}">
                                                    ${isActive ? 'Active' : 'Inactive'}
                                                </span>
                                            </td>
                                            <td class="mgmt-actions">
                                                <button class="btn-edit" onclick="window.customerCRUD('update', ${globalIndex})"><i class="fas fa-edit"></i></button>
                                                <button class="btn-toggle" onclick="window.customerCRUD('toggle', ${globalIndex})"><i class="fas fa-power-off"></i></button>
                                                <button class="btn-delete" onclick="window.customerCRUD('delete', ${globalIndex})"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            window._allStopsReference = allStops; // Temporary reference for CRUD
            window._headersReference = headers;
        };

        window.customerCRUD = function(action, index) {
            const stops = window._allStopsReference;
            const headers = window._headersReference;
            const stop = index !== undefined ? stops[index] : null;

            if (action === 'delete') {
                if (!confirm("Are you sure you want to delete this customer?")) return;
                const rId = stop._routeId;
                const route = window.logiflowRouteCache.routes.find(r => r.id === rId);
                route.stops.splice(stop._localIndex, 1);
                saveAndRefreshMgmt();
            } 
            else if (action === 'toggle') {
                const rId = stop._routeId;
                const route = window.logiflowRouteCache.routes.find(r => r.id === rId);
                const target = route.stops[stop._localIndex];
                target.Status = (target.Status === 'Inactive') ? 'Active' : 'Inactive';
                saveAndRefreshMgmt();
            }
            else if (action === 'create' || action === 'update') {
                let formHtml = `<div style="padding:20px;"><h3>${action === 'create' ? 'Add' : 'Edit'} Customer</h3><form id="mgmtForm">`;
                headers.forEach(h => {
                    if (h.startsWith('_')) return;
                    formHtml += `
                        <div style="margin-bottom:10px;">
                            <label style="display:block;font-size:12px;color:#666;">${h}</label>
                            <input type="text" name="${h}" value="${stop ? (stop[h] || '') : ''}" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
                        </div>
                    `;
                });
                
                if (action === 'create') {
                    formHtml += `<div style="margin-bottom:10px;"><label>Select Route</label><select name="_targetRoute" style="width:100%;padding:8px;">`;
                    window.logiflowRouteCache.routes.forEach(r => {
                        formHtml += `<option value="${r.id}">${r.name}</option>`;
                    });
                    formHtml += `</select></div>`;
                }

                formHtml += `
                    <div style="margin-top:20px;">
                        <button type="button" class="btn-top btn-success" onclick="window.saveMgmtForm('${action}', ${index})">Save Changes</button>
                        <button type="button" class="btn-top" onclick="window.openCustomerManagement()">Cancel</button>
                    </div>
                </form></div>`;
                document.getElementById('sidebarContent').innerHTML = formHtml;
            }
        };

        window.saveMgmtForm = function(action, index) {
            const formData = new FormData(document.getElementById('mgmtForm'));
            const data = {};
            formData.forEach((value, key) => { data[key] = value; });

            if (action === 'update') {
                const stopRef = window._allStopsReference[index];
                const route = window.logiflowRouteCache.routes.find(r => r.id === stopRef._routeId);
                Object.assign(route.stops[stopRef._localIndex], data);
            } else {
                const route = window.logiflowRouteCache.routes.find(r => r.id === data._targetRoute);
                delete data._targetRoute;
                route.stops.push(data);
            }
            saveAndRefreshMgmt();
        };

        function saveAndRefreshMgmt() {
            localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(window.logiflowRouteCache));
            window.openCustomerManagement();
            alert("Changes saved to local memory.");
        }

        // Intercept module loading to inject the button into the Manager Portal UI dynamically
        const originalLoadModule = window.loadModule;
        window.loadModule = function(moduleName) {
            originalLoadModule(moduleName);
            if (moduleName === 'manager-portal') {
                setTimeout(() => {
                    const container = document.getElementById('sidebarContent');
                    if (container && !container.querySelector('.customer-mgmt-trigger')) {
                        const btn = document.createElement('button');
                        btn.className = 'btn-top customer-mgmt-trigger';
                        btn.style.width = '100%';
                        btn.style.marginTop = '10px';
                        btn.style.background = '#007bff';
                        btn.style.color = '#fff';
                        btn.innerHTML = '<i class="fas fa-users-gear"></i> Customer Management';
                        btn.onclick = window.openCustomerManagement;
                        container.appendChild(btn);
                    }
                }, 300);
            }
        };

        // --- NEW ADDITIONS END ---

        document.addEventListener('DOMContentLoaded', () => {
            initManagerButtons();
            initRouteSystem();
        });
    })();
    </script>
</body>
</html>
