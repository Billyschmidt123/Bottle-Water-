<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <meta name="theme-color" content="#007bff">

    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="ASSETS/LEAFLET/leaflet.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/main.css?v=1">
    <link rel="stylesheet" href="CSS/theme.css?v=1">
    <link rel="stylesheet" href="CSS/map.css?v=1">
    <link rel="stylesheet" href="CSS/modal.css?v=1">
    <link rel="stylesheet" href="CSS/manager.css?v=1">
</head>

<body>
    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap">
                <option value="">-- Select Route --</option>
            </select>
        </div>
        <div class="topbar-right">
            <button id="refreshGitHubListBtn" class="btn-top" style="background:#6f42c1; color:white;">
                <i class="fab fa-github"></i> Sync Route List
            </button>
            <button class="btn-top openManagerBtn">
                <i class="fas fa-user-gear"></i> Manager Portal
            </button>
            <button id="refreshRoutesBtn" class="btn-top">
                <i class="fas fa-sync"></i> Force Refresh
            </button>
        </div>
    </header>

    <div class="app-container">
        <aside id="sidebar">
            <div id="sidebarContent">
                <div style="padding: 20px; text-align: center; color: #666;">Ready for Route Selection</div>
            </div>
        </aside>
        <div id="mapPanel">
            <div id="map" style="height: 600px;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="JS/loader.js?v=1"></script>

    <script>
    (function () {
        const STORAGE_KEY = 'logiflow_gh_token';
        
        // Split key to prevent simple scraping while maintaining stability
        const p1 = "github_pat_11BSXV7JI0";
        const p2 = "k1iv7Q6uVTCg_pJeYK0I";
        const p3 = "Y2j421kGhDbAxI2ntoIPAbLV8sTPvJTqFBhE4XGNLLJ20GZKl8WC";
        const FINAL_KEY = p1 + p2 + p3;

        let token = localStorage.getItem(STORAGE_KEY);

        // Security check for technicians
        if (!token || token === "null" || token === "undefined") {
            const pass = prompt("LogiFlow Security: Enter Access Password:");
            
            if (pass && pass.trim() === "2026!") {
                localStorage.setItem(STORAGE_KEY, FINAL_KEY);
                token = FINAL_KEY;
                console.log("LogiFlow Unlocked.");
            } else if (pass !== null) {
                alert("Access Denied: Incorrect Password.");
                window.location.reload();
            }
        }

        const GITHUB = {
            TOKEN: token,
            REPO: 'Billyschmidt123/Bottle-Water-',
            BASE: 'https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/'
        };

        async function apiCall(url, opts = {}) {
            if (!GITHUB.TOKEN) return null;
            try {
                return await fetch(url, {
                    ...opts,
                    headers: { ...opts.headers, 'Authorization': `token ${GITHUB.TOKEN}` }
                });
            } catch (e) { return null; }
        }

        // --- STOP CARD HANDLER ---
        window.refreshRoutesFromGitHub = async function() {
            const res = await apiCall(GITHUB.BASE + 'routes/routes-manifest.json?cb=' + Date.now());
            if (res && res.ok) {
                const manifest = await res.json();
                const dropdown = document.querySelector('#routeDropdownMap');
                while (dropdown.options.length > 1) dropdown.remove(1);
                manifest.routes.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.file;
                    opt.textContent = r.name;
                    dropdown.appendChild(opt);
                });
            }
        };

        document.getElementById('routeDropdownMap').addEventListener('change', async (e) => {
            const file = e.target.value;
            if (!file) return;
            const sidebar = document.getElementById('sidebarContent');
            sidebar.innerHTML = '<div style="padding: 20px;">Fetching Stop Cards...</div>';

            const res = await apiCall(GITHUB.BASE + 'routes/' + file + '?cb=' + Date.now());
            if (res && res.ok) {
                const text = await res.text();
                const count = text.split(/\r?\n/).filter(l => l.trim()).length - 1;
                sidebar.innerHTML = `<div style="padding: 20px;">Loaded ${count} stop cards for delivery.</div>`;
            }
        });

        document.getElementById('refreshGitHubListBtn').addEventListener('click', async () => {
            const res = await apiCall(`https://api.github.com/repos/${GITHUB.REPO}/contents/routes`);
            if (res && res.ok) {
                const files = (await res.json()).filter(f => f.name.endsWith('.csv')).map(f => ({
                    id: f.name.replace('.csv', ''), name: f.name.replace('.csv', ''), file: f.name
                }));
                const manifest = { updatedAt: new Date().toISOString(), routes: files };
                const manifestUrl = `https://api.github.com/repos/${GITHUB.REPO}/contents/routes/routes-manifest.json`;
                const getRes = await apiCall(manifestUrl);
                const sha = getRes && getRes.ok ? (await getRes.json()).sha : null;

                await fetch(manifestUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB.TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update Route Manifest", content: btoa(JSON.stringify(manifest, null, 2)), sha })
                });
                await window.refreshRoutesFromGitHub();
                alert("Route list synced successfully.");
            }
        });

        document.getElementById('refreshRoutesBtn').addEventListener('click', window.refreshRoutesFromGitHub);
        window.refreshRoutesFromGitHub();
    })();
    </script>
</body>
</html>
