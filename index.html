<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culligan Water Delivery Management</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
        .topbar { height: 50px; background: #007bff; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .topbar .app-title { font-size: 18px; font-weight: bold; }
        .btn-top { background: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; color: #007bff; font-weight: bold; }
        .app-container { display: flex; height: calc(100vh - 50px); }
        #mapPanel { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        #sidebar { width: 320px; background: white; border-left: 1px solid #ccc; overflow-y: auto; padding: 10px; }
        .btn-small { padding: 4px 8px; font-size: 12px; cursor: pointer; }
        
        /* Manager Dashboard Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .mgr-modal { background: white; padding: 20px; border-radius: 8px; width: 95%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        
        .mgr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .mgr-btn { padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #f8f9fa; cursor: pointer; text-align: center; font-weight: bold; }
        .mgr-btn:hover { background: #e9ecef; }

        /* Module Container for Call-In Modal */
        #modalContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Changed to flex via JS when active */
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
        }

        .modal {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .modal-footer { margin-top: 15px; text-align: right; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="app-title"><i class="fas fa-tint"></i> Culligan Delivery</div>
    <div>
        <select id="routeDropdown" style="padding: 5px; border-radius: 4px;"></select>
        <button class="btn-top" onclick="startRouteFlow()">START ROUTE</button>
        <button class="btn-top" id="btnManager" style="background: #343a40; color: white;">MANAGER</button>
    </div>
</div>

<div class="app-container">
    <div id="mapPanel">
        <div id="map"></div>
    </div>
    <div id="sidebar">
        <div id="navAddressBar" style="font-weight: bold; margin-bottom: 5px;">No Stop Selected</div>
        <div id="navPhoneBar" style="font-size: 0.9em; color: #666; margin-bottom: 10px;">--</div>
        <div style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button class="btn-small" onclick="openDirections()">Google Maps</button>
            <button class="btn-small" onclick="navigateStop(-1)">Prev</button>
            <button class="btn-small" onclick="navigateStop(1)">Next</button>
        </div>
        <hr>
        <div id="stopList">Loading routes...</div>
    </div>
</div>

<!-- Manager Modal -->
<div id="mgrModal" class="modal-overlay">
    <div class="mgr-modal">
        <h3><i class="fas fa-user-tie"></i> Management Console</h3>
        <div class="mgr-grid">
            <div class="mgr-btn" onclick="managerCallInOrder()"><i class="fas fa-phone"></i><br>Call-In Order</div>
            <div class="mgr-btn" onclick="managerLiveView()"><i class="fas fa-truck"></i><br>Live Fleet</div>
            <div class="mgr-btn" onclick="managerViewSlips()"><i class="fas fa-file-invoice"></i><br>View Slips</div>
            <div class="mgr-btn" onclick="managerBackup()"><i class="fas fa-cloud-upload-alt"></i><br>Backup</div>
        </div>
        <div style="border-top: 1px solid #eee; padding-top: 15px;">
            <button class="btn-small" id="btnShowCust">View Customers</button>
            <button class="btn-small" id="btnShowProd">Manage Products</button>
            <button class="btn-small" id="btnForceRefresh">Force Sync</button>
            <button class="btn-small" style="float: right; background: #dc3545; color: white;" onclick="document.getElementById('mgrModal').style.display='none'">Close</button>
        </div>
        <div id="custView" style="margin-top: 15px;"></div>
        <div id="prodView" style="margin-top: 15px; display: none;"></div>
    </div>
</div>

<!-- This container hosts the Call-In module -->
<div id="modalContainer"></div>

<script>
(function() {
    let driverName = "";
    let routeDataMap = {};
    let currentRouteStops = [];
    let currentStopIndex = -1;

    const repo = 'Billyschmidt123/Bottle-Water-';

    async function init() {
        const map = L.map('map').setView([55.17, -118.79], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        document.getElementById('btnManager').onclick = () => {
            document.getElementById('mgrModal').style.display = 'flex';
        };

        loadGitHubRoutes();
    }

    // --- MANAGER ACTIONS ---
    window.managerCallInOrder = async function() { 
        const container = document.getElementById('modalContainer');
        try {
            const response = await fetch('https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/MODULES/callin-modal.html?t=' + Date.now());
            if (response.ok) {
                const html = await response.text();
                container.innerHTML = html;
                // Use flex to respect your centering CSS[cite: 1]
                container.style.display = 'flex'; 
            } else {
                alert("Call-in module not found.");
            }
        } catch (err) { console.error("Load failed:", err); }
    };

    window.closeCallInModal = function() {
        document.getElementById('modalContainer').style.display = 'none';
        document.getElementById('modalContainer').innerHTML = '';
    };

    window.managerLiveView = () => alert("Loading Fleet Tracking...");
    window.managerBackup = () => alert("GitHub Backup Successful.");
    window.managerViewSlips = () => alert("Accessing Slip Archives...");

    // --- ROUTE ACTIONS ---
    window.startRouteFlow = function() {
        const name = prompt("Enter Driver Name:");
        if (!name) return;
        driverName = name;
        alert(`Route started for ${driverName}`);
    };

    window.navigateStop = function(dir) {
        if (currentRouteStops.length === 0) return;
        currentStopIndex = Math.max(0, Math.min(currentRouteStops.length - 1, currentStopIndex + dir));
        const stop = currentRouteStops[currentStopIndex];
        document.getElementById('navAddressBar').textContent = stop.addr;
        document.getElementById('navPhoneBar').textContent = stop.phone;
    };

    window.openDirections = function() {
        if (currentStopIndex === -1) return;
        const addr = currentRouteStops[currentStopIndex].addr;
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr)}`, '_blank');
    };

    async function loadGitHubRoutes() {
        const url = `https://api.github.com/repos/${repo}/contents/routes`;
        try {
            const resp = await fetch(url);
            const files = await resp.json();
            const dropdown = document.getElementById('routeDropdown');
            dropdown.innerHTML = '<option value="">Select Route...</option>';
            files.forEach(f => {
                if(f.name.endsWith('.csv')) {
                    const opt = document.createElement('option');
                    opt.value = f.name;
                    opt.textContent = f.name.replace('.csv', '');
                    dropdown.appendChild(opt);
                }
            });
        } catch (err) { console.error("Sync Failed"); }
    }

    init();
})();
</script>
</body>
</html>
