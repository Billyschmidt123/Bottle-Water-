<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <meta name="theme-color" content="#007bff">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="ASSETS/LEAFLET/leaflet.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="CSS/main.css?v=1">
    <link rel="stylesheet" href="CSS/theme.css?v=1">
    <link rel="stylesheet" href="CSS/map.css?v=1">
    <link rel="stylesheet" href="CSS/modal.css?v=1">
    <link rel="stylesheet" href="CSS/manager.css?v=1">
    <style>
        #uploadProgressContainer { width: 100%; background: #eee; border-radius: 5px; margin: 10px 0; display: none; }
        #uploadProgressBar { width: 0%; height: 20px; background: #28a745; border-radius: 5px; text-align: center; color: white; line-height: 20px; font-size: 12px; transition: width 0.3s; }
        .local-upload-btn { background: #28a745 !important; color: white !important; }
        .github-refresh-btn { background: #6f42c1 !important; color: white !important; }
    </style>
</head>

<body>

    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap" style="margin-left:15px; padding:6px; border-radius:4px; border:1px solid #ccc;">
                <option value="">-- Select Route --</option>
            </select>
        </div>

        <div class="topbar-right">
            <input type="file" id="localFileImporter" multiple accept=".csv" style="display:none;">
            
            <button id="refreshGitHubListBtn" class="btn-top github-refresh-btn">
                <i class="fab fa-github"></i> Refresh Route List
            </button>

            <button class="btn-top local-upload-btn" onclick="document.getElementById('localFileImporter').click()">
                <i class="fas fa-file-import"></i> Import From Local Drive
            </button>

            <button class="btn-top openManagerBtn">
                <i class="fas fa-user-gear"></i> Manager Portal
            </button>

            <button id="refreshRoutesBtn" class="btn-top">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>
    </header>

    <div class="app-container">
        <div id="uploadProgressContainer" style="position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 300px; z-index: 9999;">
            <div id="uploadProgressBar">0%</div>
        </div>

        <div id="mapPanel">
            <div id="mapTopBar">
                <div id="currentStopInfo">No stop selected</div>
                <div id="mapControlButtons">
                    <button id="btnPrevStop" class="btn-top btn-small"><i class="fas fa-arrow-left"></i> Back</button>
                    <button id="btnNextStop" class="btn-top btn-small">Forward <i class="fas fa-arrow-right"></i></button>
                    <button id="btnStartRoute" class="btn-top btn-small btn-success"><i class="fas fa-play"></i> Start</button>
                    <button id="btnFinishRoute" class="btn-top btn-small btn-warning"><i class="fas fa-flag-checkered"></i> Finish</button>
                    <button id="btnDirections" class="btn-top btn-small"><i class="fas fa-route"></i> Directions</button>
                </div>
            </div>
            <div id="map"></div>
        </div>

        <aside id="sidebar">
            <div id="sidebarContent">
                <div style="padding: 20px; text-align: center; color: #666;">
                    Select a route to view delivery details.
                </div>
            </div>
        </aside>
    </div>

    <div id="modalContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="JS/loader.js?v=1"></script>

    <script>
    (function () {
        const ROUTE_CACHE_KEY = 'logiflowRouteCache_v1';

        window.loadModule = function (moduleName) {
            const container = document.getElementById('sidebarContent');
            if (!container) return;

            const url = 'MODULES/' + moduleName + '.html';
            fetch(url + '?cb=' + Date.now())
                .then(res => {
                    if (!res.ok) throw new Error('Module load failed');
                    return res.text();
                })
                .then(html => {
                    container.innerHTML = html;
                    const temp = document.createElement('div');
                    temp.innerHTML = html;
                    temp.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) newScript.src = oldScript.src;
                        else newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    });
                    
                    if (window.logiflowRouteCache) {
                        populateRouteDropdown(window.logiflowRouteCache.routes);
                    }
                })
                .catch(err => console.error(err));
        };

        function initManagerButtons() {
            document.querySelectorAll('.openManagerBtn').forEach(btn => {
                if (!btn.__bound) {
                    btn.addEventListener('click', () => window.loadModule('manager-portal'));
                    btn.__bound = true;
                }
            });
        }

        function parseCSV(text) {
            if (!text) return [];
            const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const parts = line.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = (parts[i] || '').trim());
                return obj;
            });
        }

        function populateRouteDropdown(routes) {
            if (!Array.isArray(routes)) return;
            const selectors = ['#routeDropdownMap', '#routeDropdown'];
            const dayOrder = { "monday": 1, "tuesday": 2, "wednesday": 3, "thursday": 4, "friday": 5, "saturday": 6, "sunday": 7 };
            
            const sortedRoutes = [...routes].sort((a, b) => {
                const nameA = (a.name || "").toLowerCase();
                const nameB = (b.name || "").toLowerCase();
                const weekA = parseInt((nameA.match(/week\s*(\d+)/) || [0, 0])[1]);
                const weekB = parseInt((nameB.match(/week\s*(\d+)/) || [0, 0])[1]);
                if (weekA !== weekB) return weekA - weekB;
                let dayA = 0; let dayB = 0;
                Object.keys(dayOrder).forEach(d => { if(nameA.includes(d)) dayA = dayOrder[d]; });
                Object.keys(dayOrder).forEach(d => { if(nameB.includes(d)) dayB = dayOrder[d]; });
                return dayA - dayB || nameA.localeCompare(nameB);
            });

            selectors.forEach(selector => {
                const dropdown = document.querySelector(selector);
                if (!dropdown) return;
                while (dropdown.options.length > 1) dropdown.remove(1);
                sortedRoutes.forEach(route => {
                    const opt = document.createElement('option');
                    opt.value = route.file || route.id || route.name;
                    opt.textContent = route.name || route.id;
                    dropdown.appendChild(opt);
                });
            });
        }

        window.refreshRoutesFromGitHub = function() {
            const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/';
            const manifestPath = 'routes/routes-manifest.json';

            return fetch(GITHUB_RAW_BASE + manifestPath + '?cb=' + Date.now())
                .then(res => {
                    if (!res.ok) return { routes: [] };
                    return res.json();
                })
                .then(manifest => {
                    if (!manifest.routes || manifest.routes.length === 0) return [];
                    const promises = manifest.routes.map(r => {
                        const targetPath = 'routes/' + r.file;
                        return fetch(GITHUB_RAW_BASE + targetPath + '?cb=' + Date.now())
                            .then(res => res.ok ? res.text() : null)
                            .then(csv => csv ? ({ ...r, stops: parseCSV(csv) }) : null)
                            .catch(() => null);
                    });
                    return Promise.all(promises);
                })
                .then(results => {
                    // FIX: Ensure results is an array before filtering
                    const safeResults = Array.isArray(results) ? results : [];
                    const routes = safeResults.filter(r => r !== null);
                    if (routes.length > 0) {
                        const cache = { routes: routes, updatedAt: new Date().toISOString() };
                        localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cache));
                        window.logiflowRouteCache = cache;
                        populateRouteDropdown(routes);
                    }
                    return safeResults;
                });
        };

        window.syncRouteListFromGitHubDir = async function() {
            const GITHUB_REPO = 'Billyschmidt123/Bottle-Water-';
            const DIR_PATH = 'routes';
            const API_URL = `https://api.github.com/repos/${GITHUB_REPO}/contents/${DIR_PATH}`;
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error("Folder access failed.");
                const files = await res.json();
                const csvFiles = files.filter(f => f.name.endsWith('.csv')).map(f => ({
                    id: f.name.replace('.csv', ''),
                    name: f.name.replace('.csv', ''),
                    file: f.name
                }));
                if (csvFiles.length === 0) return alert("No CSVs found.");
                
                const routelist = { updatedAt: new Date().toISOString(), routes: csvFiles };
                await window.pushRouteListToGitHub(routelist);
                await window.refreshRoutesFromGitHub();
                alert(`Synced ${csvFiles.length} routes from GitHub directory.`);
            } catch (e) { alert("Sync Error: " + e.message); }
        };

        function initRouteSystem() {
            let cached = (function(){ try { return JSON.parse(localStorage.getItem(ROUTE_CACHE_KEY)); } catch(e){return null;}})();
            if (cached) {
                window.logiflowRouteCache = cached;
                populateRouteDropdown(cached.routes);
            }
            window.refreshRoutesFromGitHub().catch(() => {});
            document.getElementById('refreshGitHubListBtn').addEventListener('click', () => window.syncRouteListFromGitHubDir());
        }

        window.pushRouteListToGitHub = async function(routelist) {
            const GITHUB_TOKEN = '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';
            const GITHUB_REPO = 'Billyschmidt123/Bottle-Water-';
            const FILE_PATH = 'routes/routes-manifest.json';
            try {
                const getRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                let sha = getRes.ok ? (await getRes.json()).sha : null;
                await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Update route manifest",
                        content: btoa(JSON.stringify(routelist, null, 2)),
                        sha: sha
                    })
                });
            } catch(e) { console.error("GitHub push failed"); }
        };

        document.getElementById('localFileImporter').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const progressContainer = document.getElementById('uploadProgressContainer');
            const progressBar = document.getElementById('uploadProgressBar');
            progressContainer.style.display = 'block';

            let routes = [];
            let processedCount = 0;

            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const stops = parseCSV(event.target.result);
                    routes.push({ id: file.name.replace('.csv', ''), name: file.name.replace('.csv', ''), file: file.name, stops: stops });
                    processedCount++;
                    progressBar.style.width = Math.round((processedCount / files.length) * 100) + '%';

                    if (processedCount === files.length) {
                        const cache = { routes: routes, updatedAt: new Date().toISOString() };
                        localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cache));
                        window.logiflowRouteCache = cache;
                        populateRouteDropdown(routes);
                        
                        progressContainer.style.display = 'none';

                        // Confirmation workflow
                        const confirmSync = confirm(`Loaded ${files.length} routes. Generate Route List JSON and sync to GitHub?`);
                        if (confirmSync) {
                            const routelist = { updatedAt: new Date().toISOString(), routes: routes.map(r => ({ id: r.id, name: r.name, file: r.file })) };
                            window.pushRouteListToGitHub(routelist).then(() => {
                                alert("Success: Route List created and synced.");
                            });
                        }
                    }
                };
                reader.readAsText(file);
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            initManagerButtons();
            initRouteSystem();
        });
    })();
    </script>
</body>
</html>
