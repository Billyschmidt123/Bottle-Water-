<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; background: #f4f7f6; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; z-index: 1000; background: white; padding: 0 15px; border-bottom: 2px solid #007bff; display: flex; justify-content: space-between; align-items: center; }
        .app-container { display: flex; width: 100vw; height: calc(100vh - 75px); margin-top: 75px; }
        #mapPanel { flex: 0 0 70%; height: 100%; }
        #map { width: 100%; height: 100%; }
        #sidebar { flex: 0 0 30%; height: 100%; border-left: 2px solid #ccc; overflow-y: auto; background: white; }
        .btn-top { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .mgmt-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        .mgmt-table th { background: #007bff; color: white; padding: 10px; position: sticky; top: 0; text-align: left; z-index: 10; }
        .mgmt-table td { padding: 8px; border-bottom: 1px solid #ddd; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 95%; max-width: 1250px; max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        .form-group label { font-size: 0.75rem; font-weight: bold; color: #666; }
        .form-group input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #eee; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; }
    </style>
</head>
<body>

    <header class="topbar">
        <div>
            <span style="font-weight: bold; color: #007bff; font-size: 1.2rem;">LogiFlow</span>
            <select id="routeDropdown" style="margin-left:15px; padding: 5px;"></select>
        </div>
        <div>
            <button onclick="openManager('customer')" class="btn-top" style="background: #495057; margin-right: 5px;">CUSTOMER MAINT</button>
            <!-- ADDITION: Product Maintenance Button -->
            <button onclick="openProductManager()" class="btn-top" style="background: #28a745;">PRODUCT MAINT</button>
        </div>
    </header>

    <div class="app-container">
        <div id="mapPanel"><div id="map"></div></div>
        <aside id="sidebar"><div id="stopList" style="padding:15px;"></div></aside>
    </div>

    <!-- Universal Maintenance Modal -->
    <div id="mainModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h2 id="modalTitle">Maintenance</h2>
                <button onclick="document.getElementById('mainModal').style.display='none'" class="btn-top" style="background:#dc3545;">Exit</button>
            </div>
            <hr>
            <!-- ADDITION: File selector for Product Maintenance -->
            <div id="productFileTabs" style="margin-bottom: 15px; display: none;">
                <button class="tab-btn active" onclick="loadProductFile('Coffee.csv', this)">Coffee Products</button>
                <button class="tab-btn" onclick="loadProductFile('Water.csv', this)">Water Products</button>
            </div>
            <div id="tableContainer" style="overflow-x: auto;">
                <table class="mgmt-table">
                    <thead id="mainTableHead"></thead>
                    <tbody id="mainTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal (Preserved from existing structure) -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <h3>Edit Record</h3>
            <div id="editFields" class="form-grid"></div>
            <div style="margin-top:20px; text-align:right;">
                <button onclick="document.getElementById('editModal').style.display='none'" class="btn-top" style="background:#6c757d;">Cancel</button>
                <button id="saveRecordBtn" class="btn-top">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Existing State (DO NOT MODIFY)
        let map, currentRouteData = [];

        // --- START ADDITIONS ---
        
        /**
         * Opens the Product Maintenance Menu
         * Follows the format of openManager('customer')
         */
        function openProductManager() {
            document.getElementById('modalTitle').innerText = "Product Maintenance";
            document.getElementById('productFileTabs').style.display = 'block';
            document.getElementById('mainModal').style.display = 'flex';
            // Default to Coffee
            loadProductFile('Coffee.csv', document.querySelector('#productFileTabs .tab-btn'));
        }

        /**
         * Loads specific CSV files from the Products directory
         * References: image_69dee3.png, image_69de83.png, image_69db3e.png
         */
        async function loadProductFile(fileName, btnElement) {
            // Update UI tabs
            document.querySelectorAll('#productFileTabs .tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            try {
                // Path based on image_69dee3.png
                const response = await fetch(`Products/${fileName}`);
                const csvText = await response.text();
                const lines = csvText.split('\n').filter(line => line.trim() !== "");
                
                if (lines.length === 0) return;

                // Column headers from Row 1
                const headers = lines[0].split(',');
                const tableHead = document.getElementById('mainTableHead');
                const tableBody = document.getElementById('mainTableBody');

                tableHead.innerHTML = `<tr>${headers.map(h => `<th>${h.trim()}</th>`).join('')}<th>Actions</th></tr>`;
                tableBody.innerHTML = "";

                // Populate Rows
                for (let i = 1; i < lines.length; i++) {
                    const columns = lines[i].split(',');
                    const tr = document.createElement('tr');
                    
                    // Specific logic for column 1 (Category) and column 2 (Item) per user request
                    tr.innerHTML = columns.map(c => `<td>${c.trim()}</td>`).join('') + 
                                   `<td><button onclick="editProductRow(${i}, '${fileName}')" class="btn-top" style="padding:4px 8px; font-size:0.7rem;">EDIT</button></td>`;
                    tableBody.appendChild(tr);
                }
            } catch (err) {
                console.error("Error loading product file:", err);
            }
        }

        function editProductRow(index, file) {
            // Placeholder for edit functionality consistent with customer maint
            document.getElementById('editModal').style.display = 'flex';
            console.log(`Editing row ${index} in ${file}`);
        }

        // --- END ADDITIONS ---

        // Existing openManager for customers (DO NOT MODIFY)
        function openManager(type) {
            document.getElementById('productFileTabs').style.display = 'none';
            document.getElementById('modalTitle').innerText = "Customer Maintenance";
            document.getElementById('mainModal').style.display = 'flex';
            // Original customer loading logic would go here
        }

        // Initialize Map (Existing Logic - DO NOT MODIFY)
        function initMap() {
            map = L.map('map').setView([55.1707, -118.7947], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        window.onload = initMap;
    </script>
</body>
</html>
