<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <meta name="theme-color" content="#007bff">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="ASSETS/LEAFLET/leaflet.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="CSS/main.css?v=1">
    <link rel="stylesheet" href="CSS/theme.css?v=1">
    <link rel="stylesheet" href="CSS/map.css?v=1">
    <link rel="stylesheet" href="CSS/modal.css?v=1">
    <link rel="stylesheet" href="CSS/manager.css?v=1">
    <!-- ADDED STYLES FOR PROGRESS TRACKER -->
    <style>
        #uploadProgressContainer { width: 100%; background: #eee; border-radius: 5px; margin: 10px 0; display: none; }
        #uploadProgressBar { width: 0%; height: 20px; background: #28a745; border-radius: 5px; text-align: center; color: white; line-height: 20px; font-size: 12px; transition: width 0.3s; }
        .upload-section { padding: 15px; border: 2px dashed #007bff; border-radius: 8px; margin: 10px; background: #f8f9fa; }
    </style>
</head>

<body>

    <header class="topbar">
        <div class="topbar-left">
            <span class="app-title">LogiFlow Delivery System</span>
            <select id="routeDropdownMap" style="margin-left:15px; padding:6px; border-radius:4px; border:1px solid #ccc;">
                <option value="">-- Select Route --</option>
            </select>
        </div>

        <div class="topbar-right">
            <!-- NEW UPLOAD INTERFACE ADDED TO HEADER AREA -->
            <div id="bulkUploadControls" style="display:inline-block; margin-right:10px; vertical-align: middle;">
                <input type="file" id="bulkFilePicker" multiple accept=".csv" style="display:none;">
                <button class="btn-top" onclick="document.getElementById('bulkFilePicker').click()">
                    <i class="fas fa-upload"></i> Upload Routes (28)
                </button>
            </div>

            <button class="btn-top openManagerBtn">
                <i class="fas fa-user-gear"></i> Manager Portal
            </button>

            <button id="refreshRoutesBtn" class="btn-top">
                <i class="fas fa-sync"></i> Refresh
            </button>
        </div>
    </header>

    <div class="app-container">
        <!-- PROGRESS BAR DISPLAY AREA -->
        <div id="uploadProgressContainer">
            <div id="uploadProgressBar">0%</div>
        </div>

        <div id="mapPanel">
            <div id="mapTopBar">
                <div id="currentStopInfo">No stop selected</div>
                <div id="mapControlButtons">
                    <button id="btnPrevStop" class="btn-top btn-small"><i class="fas fa-arrow-left"></i> Back</button>
                    <button id="btnNextStop" class="btn-top btn-small">Forward <i class="fas fa-arrow-right"></i></button>
                    <button id="btnStartRoute" class="btn-top btn-small btn-success"><i class="fas fa-play"></i> Start</button>
                    <button id="btnFinishRoute" class="btn-top btn-small btn-warning"><i class="fas fa-flag-checkered"></i> Finish</button>
                    <button id="btnDirections" class="btn-top btn-small"><i class="fas fa-route"></i> Directions</button>
                </div>
            </div>
            <div id="map"></div>
        </div>

        <aside id="sidebar">
            <div id="sidebarContent">
                <div style="padding: 20px; text-align: center; color: #666;">
                    Select a route to view delivery details.
                </div>
            </div>
        </aside>
    </div>

    <div id="modalContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="JS/loader.js?v=1"></script>

    <script>
    (function () {
        const ROUTE_CACHE_KEY = 'logiflowRouteCache_v1';

        window.loadModule = function (moduleName) {
            const container = document.getElementById('sidebarContent');
            if (!container) return;

            const url = 'MODULES/' + moduleName + '.html';
            fetch(url + '?cb=' + Date.now())
                .then(res => {
                    if (!res.ok) throw new Error('Module load failed');
                    return res.text();
                })
                .then(html => {
                    container.innerHTML = html;
                    const temp = document.createElement('div');
                    temp.innerHTML = html;
                    temp.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        if (oldScript.src) newScript.src = oldScript.src;
                        else newScript.textContent = oldScript.textContent;
                        document.body.appendChild(newScript);
                    });
                    
                    if (window.logiflowRouteCache) {
                        populateRouteDropdown(window.logiflowRouteCache.routes);
                    }
                })
                .catch(err => console.error(err));
        };

        function initManagerButtons() {
            document.querySelectorAll('.openManagerBtn').forEach(btn => {
                if (!btn.__bound) {
                    btn.addEventListener('click', () => window.loadModule('manager-portal'));
                    btn.__bound = true;
                }
            });
        }

        function parseCSV(text) {
            if (!text) return [];
            const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const parts = line.split(',');
                const obj = {};
                headers.forEach((h, i) => obj[h] = (parts[i] || '').trim());
                return obj;
            });
        }

        function populateRouteDropdown(routes) {
            const selectors = ['#routeDropdownMap', '#routeDropdown'];
            selectors.forEach(selector => {
                const dropdown = document.querySelector(selector);
                if (!dropdown) return;

                while (dropdown.options.length > 1) dropdown.remove(1);

                routes.forEach(route => {
                    const opt = document.createElement('option');
                    opt.value = route.file || route.id || route.name;
                    opt.textContent = route.name || route.id;
                    dropdown.appendChild(opt);
                });
            });
        }

        window.searchAllRoutes = function(query) {
            const resultsBox = document.getElementById('searchResultsBox');
            if (!resultsBox) return;

            const searchTerm = query.toLowerCase().trim();
            if (!searchTerm) {
                resultsBox.innerHTML = '';
                return;
            }

            if (!window.logiflowRouteCache || !window.logiflowRouteCache.routes) {
                resultsBox.innerHTML = '<div class="search-item">Syncing routes... please wait.</div>';
                return;
            }

            let allMatches = [];

            window.logiflowRouteCache.routes.forEach(route => {
                if (route.stops && Array.isArray(route.stops)) {
                    const matches = route.stops.filter(stop => {
                        return Object.values(stop).some(val => 
                            String(val).toLowerCase().includes(searchTerm)
                        );
                    });

                    matches.forEach(match => {
                        allMatches.push({
                            routeId: route.name || route.id,
                            data: match
                        });
                    });
                }
            });

            if (allMatches.length === 0) {
                resultsBox.innerHTML = '<div class="search-item">No matches found in any file.</div>';
            } else {
                resultsBox.innerHTML = allMatches.map(item => `
                    <div class="search-item" onclick="selectSearchStop('${encodeURIComponent(JSON.stringify(item.data))}')">
                        <small style="color:#007bff;">[${item.routeId}]</small><br>
                        <strong>${item.data.Customer || item.data.Name || 'Client'}</strong><br>
                        <span style="font-size:0.85em;">${item.data.Address || 'No Address'}</span>
                    </div>
                `).join('');
            }
        };

        window.selectSearchStop = function(encodedData) {
            const stopData = JSON.parse(decodeURIComponent(encodedData));
            console.log("Selected Stop Data:", stopData);
            if (window.showStopOnMap) window.showStopOnMap(stopData);
        };

        window.refreshRoutesFromGitHub = function() {
            console.log("Syncing with GitHub...");
            
            const manifestOptions = [
                'routes/routes-manifest.json',
                'routes-manifest.json',
                'ROUTES/routes-manifest.json'
            ];

            const fetchManifest = (index) => {
                if (index >= manifestOptions.length) return Promise.reject('Manifest not found');
                return fetch(manifestOptions[index] + '?cb=' + Date.now())
                    .then(res => {
                        if (!res.ok) return fetchManifest(index + 1);
                        return res.json();
                    });
            };

            return fetchManifest(0)
                .then(manifest => {
                    const promises = manifest.routes.map(r => {
                        let targetPath = r.file;
                        
                        const tryPaths = [
                            targetPath,
                            'routes/' + targetPath,
                            'ROUTES/' + targetPath
                        ];

                        const attemptFetch = (pathIndex) => {
                            if (pathIndex >= tryPaths.length) return Promise.reject('File not found');
                            const encodedPath = encodeURI(tryPaths[pathIndex]);
                            
                            return fetch(encodedPath + '?cb=' + Date.now())
                                .then(res => {
                                    if (!res.ok) return attemptFetch(pathIndex + 1);
                                    return res.text();
                                });
                        };

                        return attemptFetch(0)
                            .then(csv => ({ ...r, stops: parseCSV(csv) }))
                            .catch(() => null);
                    });

                    return Promise.all(promises);
                })
                .then(results => {
                    const routes = results.filter(r => r !== null);
                    const cache = { routes: routes, updatedAt: new Date().toISOString() };
                    localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cache));
                    window.logiflowRouteCache = cache;
                    populateRouteDropdown(routes);
                    return cache;
                });
        };

        function loadRouteCache() {
            try {
                const raw = localStorage.getItem(ROUTE_CACHE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        function initRouteSystem() {
            let cached = loadRouteCache();
            
            if (!cached) {
                console.log("Initializing local cache...");
                cached = { routes: [], updatedAt: new Date().toISOString() };
                localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cached));
            }

            if (cached) {
                window.logiflowRouteCache = cached;
                populateRouteDropdown(cached.routes);
            }
            
            window.refreshRoutesFromGitHub().catch(e => console.warn("Sync failed: " + e));

            document.getElementById('refreshRoutesBtn').addEventListener('click', (e) => {
                e.preventDefault();
                window.refreshRoutesFromGitHub().then(() => alert("Routes Updated")).catch(err => alert("Update failed: " + err));
            });
        }

        window.closeModal = function() {
            const container = document.getElementById('sidebarContent');
            const header = container.querySelector('h2');
            if (header && (header.textContent === 'Bulk Route Importer' || header.textContent === 'Bulk Route Importer & GitHub Sync')) {
                window.loadModule('manager-portal');
            } else {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">Select a route to begin.</div>';
            }
        };

        window.updateManifestManually = function(jsonString) {
            try {
                const data = JSON.parse(jsonString);
                if (data.routes) {
                    const cache = { routes: data.routes, updatedAt: new Date().toISOString(), manual: true };
                    localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cache));
                    window.logiflowRouteCache = cache;
                    populateRouteDropdown(data.routes);
                    return true;
                }
            } catch(e) { console.error("Invalid JSON provided"); return false; }
        };

        // --- NEW BULK UPLOAD AND PROGRESS LOGIC ADDED BELOW ---
        document.getElementById('bulkFilePicker').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const progressContainer = document.getElementById('uploadProgressContainer');
            const progressBar = document.getElementById('uploadProgressBar');
            progressContainer.style.display = 'block';

            let routes = [];
            let processedCount = 0;

            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const csvContent = event.target.result;
                    const stops = parseCSV(csvContent);
                    
                    routes.push({
                        id: file.name.replace('.csv', ''),
                        name: file.name.replace('.csv', ''),
                        file: file.name,
                        stops: stops
                    });

                    processedCount++;
                    const percent = Math.round((processedCount / files.length) * 100);
                    progressBar.style.width = percent + '%';
                    progressBar.innerText = `Processing: ${percent}% (${processedCount}/${files.length})`;

                    if (processedCount === files.length) {
                        // Create the routelist file structure in memory
                        const routelist = {
                            updatedAt: new Date().toISOString(),
                            routes: routes.map(r => ({ id: r.id, name: r.name, file: r.file }))
                        };

                        // Update the system cache and dropdowns
                        const cache = { routes: routes, updatedAt: new Date().toISOString() };
                        localStorage.setItem(ROUTE_CACHE_KEY, JSON.stringify(cache));
                        window.logiflowRouteCache = cache;
                        populateRouteDropdown(routes);

                        setTimeout(() => {
                            alert(`Success: ${files.length} routes imported and routelist created.`);
                            progressContainer.style.display = 'none';
                            progressBar.style.width = '0%';
                        }, 500);
                    }
                };
                reader.readAsText(file);
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            initManagerButtons();
            initRouteSystem();
        });
    })();
    </script>
</body>
</html>
