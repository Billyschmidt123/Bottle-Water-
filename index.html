<!-- 
  PROJECT: Culligan Bottle Water Delivery System
  VERSION: Manager Function Expansion
  STATUS: Stable - Non-Destructive Addition
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culligan Bottle Water Delivery System</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; background: #f4f7f6; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; z-index: 1000; background: white; padding: 0 15px; border-bottom: 2px solid #007bff; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .topbar-center { flex-grow: 1; display: flex; justify-content: center; gap: 25px; font-size: 0.9rem; color: #333; background: #f8f9fa; margin: 0 20px; padding: 8px 15px; border-radius: 5px; border: 1px solid #ddd; }
        .app-container { display: flex; width: 100vw; height: calc(100vh - 75px); margin-top: 75px; }
        #mapPanel { flex: 0 0 70%; height: 100%; position: relative; background: #e0e0e0; }
        #map { width: 100%; height: 100%; }
        #sidebar { flex: 0 0 30%; height: 100%; border-left: 2px solid #ccc; overflow-y: auto; background: #ffffff; }
        .btn-top { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .mgmt-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .mgmt-table th { background: #007bff; color: white; text-align: left; padding: 10px; position: sticky; top: 0; }
        .mgmt-table td { padding: 8px; border-bottom: 1px solid #ddd; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto; }
        .mgmt-nav-btn { padding: 10px 20px; margin-right: 10px; border: 1px solid #007bff; background: #f8f9fa; color: #007bff; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .mgmt-nav-btn.active { background: #007bff; color: white; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; color: #666; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }

        .edit-input { width: 95%; padding: 6px; border: 2px solid #007bff; border-radius: 3px; font-size: 0.85rem; background: #ffffff; color: #000000; display: block; }
        .deactivated-row { background-color: #fceaea; color: #a94442; }

        /* ADDITION: touch-action none prevents tablet scrolling while signing */
        #sig-canvas { border: 2px dotted #CCCCCC; border-radius: 5px; cursor: crosshair; background: #eee; width: 100%; height: 150px; touch-action: none; pointer-events: none; opacity: 0.6; }
        .cart-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        .cart-table th { background: #eee; text-align: left; padding: 5px; }
        .cart-table td { border-bottom: 1px solid #eee; padding: 5px; }

        .meta-edit-input { border: 1px solid #ccc; padding: 4px; border-radius: 3px; font-size: 0.8rem; width: 80%; }
        .meta-edit-textarea { border: 1px solid #ccc; padding: 4px; border-radius: 3px; font-size: 0.8rem; width: 95%; height: 40px; font-family: inherit; }

        .cart-add-row { display: flex; gap: 5px; align-items: center; margin-top: 5px; flex-wrap: wrap; }
        .qty-input { width: 50px; padding: 7px; border: 1px solid #ddd; border-radius: 4px; text-align: center; }
        .unit-input { width: 80px; padding: 7px; border: 1px solid #ddd; border-radius: 4px; }

        #stopModal .modal-content { max-width: 1100px; width: 98%; }
        #stopModal .form-grid { grid-template-columns: 1fr; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <span style="font-weight: bold; color: #007bff; margin-right: 15px;">LogiFlow</span>
            <select id="routeDropdown" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">Select Route...</option>
            </select>
        </div>
        <div class="topbar-center">
            <div><i class="fas fa-map-marker-alt" style="color:#007bff"></i> <span id="currentAddress">Awaiting Data...</span></div>
            <div><i class="fas fa-phone" style="color:#28a745"></i> <span id="currentPhone">--</span></div>
        </div>
        <div class="topbar-right">
            <button id="btnForceRefresh" class="btn-top" style="background: #17a2b8; margin-right: 10px;"><i class="fas fa-sync-alt"></i> FORCE REFRESH</button>
            <button id="btnManager" class="btn-top" style="background: #495057;">MANAGER MENU</button>
        </div>
    </header>

    <div class="app-container">
        <div id="mapPanel"><div id="map"></div></div>
        <aside id="sidebar">
            <div id="sidebarContent" style="padding: 10px;">
                <h3 style="text-align: center; color: #444;">Route Stops</h3>
                <div id="stopList" style="text-align:center; color:#999; margin-top:20px;">Select a route to begin.</div>
            </div>
        </aside>
    </div>

    <div id="stopModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h2 id="stopModalTitle">Complete Delivery</h2>
                <button onclick="document.getElementById('stopModal').style.display='none'" class="btn-top" style="background:#dc3545;">Close</button>
            </div>
            <hr>
            
            <div id="stopMetadata" style="font-size: 0.85rem; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><strong>Address:</strong> <span id="metaAddress">--</span></div>
                <div><strong>Phone:</strong> <span id="metaPhone">--</span></div>
                <div><strong>Email:</strong> <span id="metaEmail">--</span></div>
                <div><strong>Special Order:</strong> <span id="metaSpecOrder">--</span></div>
                
                <div><strong>Deliv Fee:</strong> <input type="text" id="editMetaDelivFee" class="meta-edit-input"></div>
                <div><strong>Travel:</strong> <input type="text" id="editMetaTravel" class="meta-edit-input"></div>
                <div><strong>PO #:</strong> <input type="text" id="editMetaPO" class="meta-edit-input"></div>
                
                <div style="grid-column: span 2;"><strong>Special Instructions:</strong> <span id="metaSpecInst">--</span></div>
                
                <div style="grid-column: span 2;">
                    <strong>Notes:</strong><br>
                    <textarea id="editMetaNotes" class="meta-edit-textarea"></textarea>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Water Product</label>
                    <div class="cart-add-row">
                        <select id="stopProductDropdown" style="flex-grow:1; min-width: 150px;">
                            <option value="">Choose water product...</option>
                        </select>
                        <input type="number" id="qtyWater" class="qty-input" value="1" min="1">
                        <input type="text" id="unitWater" class="unit-input" placeholder="Units">
                        <button class="btn-top" onclick="addProductToCart('stopProductDropdown', 'qtyWater', 'unitWater')" style="background:#28a745;">ADD</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Coffee Product</label>
                    <div class="cart-add-row">
                        <select id="stopCoffeeDropdown" style="flex-grow:1; min-width: 150px;">
                            <option value="">Choose coffee product...</option>
                        </select>
                        <input type="number" id="qtyCoffee" class="qty-input" value="1" min="1">
                        <input type="text" id="unitCoffee" class="unit-input" placeholder="Units">
                        <button class="btn-top" onclick="addProductToCart('stopCoffeeDropdown', 'qtyCoffee', 'unitCoffee')" style="background:#6f4e37;">ADD</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Signature (Required)</label>
                    <!-- ADDITION: Activation and Clear Buttons -->
                    <div style="margin-bottom: 5px; display: flex; gap: 10px;">
                        <button id="btnActivateSig" class="btn-top" style="background:#007bff; flex: 1;" onclick="activateSignatureBox()">CLICK TO SIGN</button>
                        <button id="btnClearSig" class="btn-top" style="background:#6c757d; width: 80px;" onclick="clearSignatureCanvas()">CLEAR</button>
                    </div>
                    <canvas id="sig-canvas"></canvas>
                </div>
                <div class="form-group">
                    <label>Received By (Required)</label>
                    <input type="text" id="receivedBy" placeholder="Name of person receiving">
                </div>
            </div>

            <div style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px;">
                <h4 style="margin: 0;"><i class="fas fa-shopping-cart"></i> Delivery Items</h4>
                <table class="cart-table">
                    <thead>
                        <tr><th>Item</th><th>Qty</th><th>Units</th><th style="width:50px;">Action</th></tr>
                    </thead>
                    <tbody id="cartItemsBody">
                        <tr><td colspan="4" style="color:#999; text-align:center;">No items added.</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="document.getElementById('stopModal').style.display='none'" class="btn-top" style="background:#6c757d;">Cancel</button>
                <button class="btn-top" onclick="validateAndFinishStop()" style="background:#28a745;">FINISH STOP</button>
            </div>
        </div>
    </div>

    <!-- Manager Modal -->
    <div id="mgrModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h2>Manager Control Panel</h2>
                <button onclick="document.getElementById('mgrModal').style.display='none'" class="btn-top" style="background:#dc3545;">Exit</button>
            </div>
            <hr>
            <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 5px;">
                <button id="btnShowCust" class="mgmt-nav-btn active">Customer Maintenance</button>
                <button id="btnShowProd" class="mgmt-nav-btn">Product Maintenance</button>
                <!-- ADDITION: New Manager Buttons -->
                <button id="btnEndOfDay" class="mgmt-nav-btn" onclick="managerEndOfDay()">End of Day</button>
                <button id="btnLiveView" class="mgmt-nav-btn" onclick="managerLiveView()">Live View</button>
                <button id="btnCallInOrder" class="mgmt-nav-btn" onclick="managerCallInOrder()">Call in Order</button>
                <button id="btnBackup" class="mgmt-nav-btn" onclick="managerBackup()">Back up</button>
                <button id="btnViewSlips" class="mgmt-nav-btn" onclick="managerViewSlips()">View Slips</button>
                <button id="btnViewPastLogs" class="mgmt-nav-btn" onclick="managerViewPastLogs()">View Past Stop Logs</button>
                <button id="btnUserMgmt" class="mgmt-nav-btn" onclick="managerUserMgmt()">User Management</button>
            </div>

            <div id="custView" style="display: block;">
                <table class="mgmt-table">
                    <thead id="custTableHead"></thead>
                    <tbody id="custTableBody"></tbody>
                </table>
            </div>

            <div id="prodView" style="display: none;">
                <div style="margin-bottom:15px;">
                    <button class="btn-top" onclick="loadProductFile('Coffee.csv')" style="background:#6f4e37;">Coffee Products</button>
                    <button class="btn-top" onclick="loadProductFile('Water.csv')" style="background:#00a8e8;">Water Products</button>
                </div>
                <div style="overflow-x: auto;">
                    <table class="mgmt-table">
                        <thead id="prodTableHead"></thead>
                        <tbody id="prodTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px;">
            <h2 id="editModalTitle">Edit Record</h2>
            <hr>
            <div id="editFormFields" class="form-grid"></div>
            <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="document.getElementById('editModal').style.display='none'" class="btn-top" style="background:#6c757d;">Cancel</button>
                <button id="btnSaveRecord" class="btn-top" style="background:#28a745;">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function() {
        const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
        const token = _k.map(c => String.fromCharCode(c)).join('');
        const repo = 'Billyschmidt123/Bottle-Water-';
        
        let globalCustomers = [];
        let csvHeaders = [];
        let routeDataMap = {}; 

        let currentProdList = [];
        let currentProdHeaders = [];
        let editingIndex = -1;
        let currentProductFile = '';
        let currentProductSHA = '';

        let deliveryCart = [];
        let isSigBlank = true;

        async function ghGet(path) {
            const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            return r.ok ? await r.json() : [];
        }

        async function loadAllCustomers() {
            const files = await ghGet('routes');
            const tbody = document.getElementById('custTableBody');
            const thead = document.getElementById('custTableHead');
            tbody.innerHTML = '<tr><td colspan="10">Scanning files...</td></tr>';
            
            globalCustomers = [];
            routeDataMap = {};
            csvHeaders = [];

            for (let f of files) {
                if (!f.name.endsWith('.csv')) continue;
                const resp = await fetch(f.download_url + "?t=" + Date.now());
                const text = await resp.text();
                routeDataMap[f.name] = { text: text, sha: f.sha };
                
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length < 2) continue;

                if (csvHeaders.length === 0) {
                    csvHeaders = lines[0].split(',').map(h => h.trim());
                    thead.innerHTML = `<tr><th>Action</th>${csvHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;
                }

                lines.slice(1).forEach(line => {
                    const vals = line.split(',');
                    let rowObj = {};
                    csvHeaders.forEach((h, i) => rowObj[h] = (vals[i] || "").trim());
                    
                    const nameKey = csvHeaders.find(h => ["company", "name", "customer"].some(w => h.toLowerCase().includes(w)));
                    const addrKey = csvHeaders.find(h => h.toLowerCase().includes("address"));

                    if (rowObj[nameKey] || rowObj[addrKey]) {
                        let existing = globalCustomers.find(ex => 
                            (ex[nameKey] || "").toLowerCase() === (rowObj[nameKey] || "").toLowerCase() &&
                            (ex[addrKey] || "").toLowerCase() === (rowObj[addrKey] || "").toLowerCase()
                        );
                        if (existing) {
                            if(!existing._routes.includes(f.name)) existing._routes.push(f.name);
                        } else {
                            rowObj._routes = [f.name];
                            globalCustomers.push(rowObj);
                        }
                    }
                });
            }
            renderCustTable();
            populateRouteDropdown();
        }

        function renderCustTable() {
            const tbody = document.getElementById('custTableBody');
            tbody.innerHTML = '';
            globalCustomers.forEach((c, idx) => {
                let row = `<tr><td><button class="btn-top" style="padding:4px;" onclick="openEdit(${idx}, 'cust')">Edit</button></td>`;
                csvHeaders.forEach(h => row += `<td>${c[h] || ''}</td>`);
                tbody.innerHTML += row + '</tr>';
            });
        }

        window.loadProductFile = async function(fileName) {
            currentProductFile = fileName;
            const tbody = document.getElementById('prodTableBody');
            const theadRow = document.getElementById('prodTableHead');
            tbody.innerHTML = '<tr><td colspan="10">Gathering items...</td></tr>';
            
            try {
                const fileInfo = await ghGet(`Products/${fileName}`);
                currentProductSHA = fileInfo.sha;

                const resp = await fetch(`https://raw.githubusercontent.com/${repo}/main/Products/${fileName}?t=${Date.now()}`);
                const text = await resp.text();
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                
                if(lines.length > 0) {
                    currentProdHeaders = lines[0].split(',').map(h => h.trim()).filter(h => h !== "");
                    if (!currentProdHeaders.includes('Status')) currentProdHeaders.push('Status');
                    
                    theadRow.innerHTML = `<th>Action</th>${currentProdHeaders.map(h => `<th>${h}</th>`).join('')}`;
                    
                    currentProdList = lines.slice(1).map(line => {
                        const vals = line.split(',');
                        let pObj = {};
                        currentProdHeaders.forEach((h, i) => {
                            if (h !== 'Status') pObj[h] = (vals[i] || "").trim();
                        });
                        pObj.Status = pObj.Status || "Active";
                        return pObj;
                    });
                    
                    editingIndex = -1;
                    renderProdTable();
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="10">Unable to reach the records.</td></tr>';
            }
        };

        window.enterEditMode = function(idx) {
            editingIndex = idx;
            renderProdTable();
        };

        window.cancelEdit = function() {
            editingIndex = -1;
            renderProdTable();
        };

        window.updateRow = async function(idx) {
            const data = currentProdList[idx];
            currentProdHeaders.forEach(h => {
                if (h !== 'Status') {
                    const input = document.getElementById(`edit_${h}_${idx}`);
                    if (input) data[h] = input.value;
                }
            });

            let csvContent = currentProdHeaders.join(',') + '\n';
            csvContent += currentProdList.map(p => currentProdHeaders.map(h => p[h]).join(',')).join('\n');

            const response = await fetch(`https://api.github.com/repos/${repo}/contents/Products/${currentProductFile}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Update ${currentProductFile}`,
                    content: btoa(csvContent),
                    sha: currentProductSHA
                })
            });

            if (response.ok) {
                editingIndex = -1;
                loadProductFile(currentProductFile);
            } else {
                alert("Error saving to GitHub.");
            }
        };

        window.toggleStatus = function(idx) {
            currentProdList[idx].Status = currentProdList[idx].Status === "Active" ? "Deactivated" : "Active";
            renderProdTable();
        };

        function renderProdTable() {
            const tbody = document.getElementById('prodTableBody');
            tbody.innerHTML = '';
            
            currentProdList.forEach((pObj, idx) => {
                const isDeactivated = pObj.Status === "Deactivated";
                const isEditing = (editingIndex === idx);
                const tr = document.createElement('tr');
                if (isDeactivated) tr.className = 'deactivated-row';
                
                const tdAction = document.createElement('td');
                if (isEditing) {
                    tdAction.innerHTML = `
                        <button class="btn-top" style="padding:4px; background:#28a745;" onclick="updateRow(${idx})">Update</button>
                        <button class="btn-top" style="padding:4px; background:#6c757d;" onclick="cancelEdit()">Cancel</button>
                    `;
                } else {
                    tdAction.innerHTML = `<button class="btn-top" style="padding:4px;" onclick="enterEditMode(${idx})">Edit</button>`;
                }
                tr.appendChild(tdAction);
                
                currentProdHeaders.forEach(h => {
                    const td = document.createElement('td');
                    const val = pObj[h] || '';
                    
                    if (isEditing) {
                        if (h === 'Status') {
                            td.innerHTML = `<button class="btn-top" style="padding:2px; font-size:0.7rem; background:#17a2b8;" onclick="toggleStatus(${idx})">${val}</button>`;
                        } else {
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.className = 'edit-input';
                            input.id = `edit_${h}_${idx}`;
                            input.value = val;
                            td.appendChild(input);
                        }
                    } else {
                        td.textContent = val;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        window.openEdit = function(idx, type) {
            const data = type === 'cust' ? globalCustomers[idx] : null;
            const fields = type === 'cust' ? csvHeaders : [];
            const container = document.getElementById('editFormFields');
            container.innerHTML = '';
            fields.forEach(h => {
                container.innerHTML += `<div class="form-group"><label>${h}</label><input type="text" value="${data[h]}" id="f_${h}"></div>`;
            });
            document.getElementById('editModal').style.display = 'flex';
        };

        /* ADDITION: Manual Activation & Clearing Helpers */
        window.activateSignatureBox = function() {
            const canvas = document.getElementById('sig-canvas');
            const btn = document.getElementById('btnActivateSig');
            canvas.style.pointerEvents = 'auto';
            canvas.style.opacity = '1';
            canvas.style.background = '#fff';
            btn.style.background = '#28a745';
            btn.textContent = 'READY TO SIGN';
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            isSigBlank = true;
            
            ctx.font = "24px 'Segoe UI'";
            ctx.fillStyle = "#CCCCCC";
            /* ADDITION: Center watermark text */
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("SIGN HERE", canvas.width / 2, canvas.height / 2);
        };

        window.clearSignatureCanvas = function() {
            const canvas = document.getElementById('sig-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            isSigBlank = true;
            
            ctx.font = "24px 'Segoe UI'";
            ctx.fillStyle = "#CCCCCC";
            /* ADDITION: Center watermark text */
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("SIGN HERE", canvas.width / 2, canvas.height / 2);
        };

        window.openStopModal = async function(companyName, customerData = {}) {
            document.getElementById('stopModalTitle').textContent = `Delivery: ${companyName}`;
            document.getElementById('stopModal').style.display = 'flex';
            
            document.getElementById('metaAddress').textContent = `${customerData.Address || '--'}, ${customerData.City || ''} ${customerData.PostalCode || ''}`;
            document.getElementById('metaPhone').textContent = customerData.Phone || '--';
            document.getElementById('metaEmail').textContent = customerData.Email || '--';
            document.getElementById('metaSpecOrder').textContent = customerData['Special Order'] || '--';
            document.getElementById('metaSpecInst').textContent = customerData['Special instructiosn'] || '--';

            document.getElementById('editMetaDelivFee').value = customerData['Delivery charge'] || '$0';
            document.getElementById('editMetaTravel').value = customerData.Travel || '$0';
            document.getElementById('editMetaPO').value = customerData['Purchase order'] || '';
            document.getElementById('editMetaNotes').value = customerData.Notes || '';

            document.getElementById('receivedBy').value = '';
            
            deliveryCart = [];
            renderDeliveryCart();

            /* ADDITION: Reset the activation button state */
            const sigBtn = document.getElementById('btnActivateSig');
            sigBtn.style.background = '#007bff';
            sigBtn.textContent = 'CLICK TO SIGN';
            const canvas = document.getElementById('sig-canvas');
            canvas.style.pointerEvents = 'none';
            canvas.style.opacity = '0.6';
            canvas.style.background = '#eee';

            const waterDropdown = document.getElementById('stopProductDropdown');
            waterDropdown.innerHTML = '<option value="">Loading...</option>';
            const coffeeDropdown = document.getElementById('stopCoffeeDropdown');
            coffeeDropdown.innerHTML = '<option value="">Loading...</option>';

            async function populateProd(fileName, targetId) {
                try {
                    const resp = await fetch(`https://raw.githubusercontent.com/${repo}/main/Products/${fileName}?t=${Date.now()}`);
                    const text = await resp.text();
                    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                    const target = document.getElementById(targetId);
                    if (lines.length > 1) {
                        const h = lines[0].split(',');
                        const dIdx = h.findIndex(col => col.toLowerCase().includes('desc') || col.toLowerCase().includes('item'));
                        target.innerHTML = `<option value="">Choose ${fileName.replace('.csv','')} product...</option>`;
                        lines.slice(1).forEach(l => {
                            const v = l.split(',');
                            const o = document.createElement('option');
                            o.value = v[dIdx] || v[0]; 
                            o.textContent = v[dIdx] || v[0];
                            target.appendChild(o);
                        });
                    }
                } catch(e) { document.getElementById(targetId).innerHTML = '<option>Error</option>'; }
            }

            populateProd('Water.csv', 'stopProductDropdown');
            populateProd('Coffee.csv', 'stopCoffeeDropdown');

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            isSigBlank = true; 
            
            let drawing = false;

            /* ADDITION: Helper to clear watermark on first interaction */
            function clearWatermark() {
                if (isSigBlank) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    isSigBlank = false;
                }
            }

            canvas.onmousedown = (e) => { 
                clearWatermark();
                drawing = true; ctx.beginPath(); 
            };
            canvas.onmouseup = () => { drawing = false; };
            canvas.onmousemove = (e) => {
                if (!drawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };

            /* ADDITION: Tablet-specific listeners to stop modal movement while signing */
            canvas.addEventListener("touchstart", function (e) {
                if (e.target == canvas) {
                    e.preventDefault();
                    clearWatermark();
                    drawing = true; ctx.beginPath();
                }
            }, { passive: false });

            canvas.addEventListener("touchend", function (e) {
                if (e.target == canvas) {
                    e.preventDefault();
                    drawing = false;
                }
            }, { passive: false });

            canvas.addEventListener("touchmove", function (e) {
                if (e.target == canvas) {
                    e.preventDefault();
                    if (!drawing) return;
                    const rect = canvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
                    ctx.stroke();
                }
            }, { passive: false });
        };

        window.validateAndFinishStop = function() {
            const name = document.getElementById('receivedBy').value.trim();
            if (!name) {
                alert("Please enter the name of the person receiving the delivery.");
                return;
            }
            if (isSigBlank) {
                alert("A signature is required to complete the delivery.");
                return;
            }
            alert("Stop finished successfully!");
            document.getElementById('stopModal').style.display='none';
        };

        window.addProductToCart = function(dropdownId, qtyId, unitId) {
            const dropdown = document.getElementById(dropdownId);
            const qtyInput = document.getElementById(qtyId);
            const unitInput = document.getElementById(unitId);
            const itemName = dropdown.value;
            const qty = parseInt(qtyInput.value);
            const units = unitInput.value || '';

            if (!itemName) return;

            const existing = deliveryCart.find(i => i.name === itemName && i.units === units);
            if (existing) {
                existing.qty += qty;
            } else {
                deliveryCart.push({ name: itemName, qty: qty, units: units });
            }

            qtyInput.value = 1;
            unitInput.value = '';
            dropdown.selectedIndex = 0;
            renderDeliveryCart();
        };

        window.removeFromCart = function(index) {
            deliveryCart.splice(index, 1);
            renderDeliveryCart();
        };

        function renderDeliveryCart() {
            const body = document.getElementById('cartItemsBody');
            if (deliveryCart.length === 0) {
                body.innerHTML = '<tr><td colspan="4" style="color:#999; text-align:center;">No items added.</td></tr>';
                return;
            }
            body.innerHTML = deliveryCart.map((item, idx) => `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>${item.units}</td>
                    <td><button onclick="removeFromCart(${idx})" style="background:none; border:none; color:red; cursor:pointer;"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        async function init() {
            const map = L.map('map').setView([55.17, -118.79], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            document.getElementById('btnManager').onclick = () => {
                document.getElementById('mgrModal').style.display = 'flex';
                loadAllCustomers();
            };

            document.getElementById('btnShowCust').onclick = () => {
                document.getElementById('custView').style.display = 'block';
                document.getElementById('prodView').style.display = 'none';
                document.getElementById('btnShowCust').classList.add('active');
                document.getElementById('btnShowProd').classList.remove('active');
            };

            document.getElementById('btnShowProd').onclick = () => {
                document.getElementById('custView').style.display = 'none';
                document.getElementById('prodView').style.display = 'block';
                document.getElementById('btnShowProd').classList.add('active');
                document.getElementById('btnShowCust').classList.remove('active');
                loadProductFile('Coffee.csv');
            };

            document.getElementById('btnForceRefresh').onclick = loadAllCustomers;
            
            loadGitHubRoutes();
            loadAllCustomers(); 
        }

        async function loadGitHubRoutes() {
            const files = await ghGet('routes');
            const dropdown = document.getElementById('routeDropdown');
            dropdown.innerHTML = '<option value="">Select Route...</option>';
            
            files.forEach(f => {
                if(f.name.endsWith('.csv')) {
                    const opt = document.createElement('option');
                    opt.value = f.name;
                    opt.textContent = f.name.replace('.csv', '');
                    dropdown.appendChild(opt);
                }
            });
        }

        function populateRouteDropdown() {
            const dropdown = document.getElementById('routeDropdown');
            const currentVal = dropdown.value;
            dropdown.innerHTML = '<option value="">Select Route...</option>';
            
            Object.keys(routeDataMap).forEach(fileName => {
                const opt = document.createElement('option');
                opt.value = fileName;
                opt.textContent = fileName.replace('.csv', '');
                if(fileName === currentVal) opt.selected = true;
                dropdown.appendChild(opt);
            });
        }

        document.getElementById('routeDropdown').onchange = async function() {
            const fileName = this.value;
            const stopList = document.getElementById('stopList');
            if(!fileName) {
                stopList.innerHTML = 'Select a route to begin.';
                return;
            }

            stopList.innerHTML = 'Loading stops...';
            
            let text = "";
            if(routeDataMap[fileName]) {
                text = routeDataMap[fileName].text;
            } else {
                const files = await ghGet('routes');
                const file = files.find(f => f.name === fileName);
                const resp = await fetch(file.download_url + "?t=" + Date.now());
                text = await resp.text();
            }

            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            if(lines.length < 2) {
                stopList.innerHTML = 'No data in route file.';
                return;
            }

            const headers = lines[0].split(',').map(h => h.trim());
            const compIdx = headers.findIndex(h => h.toLowerCase() === "company");
            const nameIdx = headers.findIndex(h => ["name", "customer"].some(w => h.toLowerCase().includes(w)));
            const addrIdx = headers.findIndex(h => h.toLowerCase().includes("address"));

            stopList.innerHTML = '';
            lines.slice(1).forEach((line, i) => {
                const vals = line.split(',');
                const displayName = (vals[compIdx] || vals[nameIdx] || 'Unknown').trim();
                const addr = vals[addrIdx] || 'No Address';
                
                const rowData = {};
                headers.forEach((h, idx) => rowData[h] = (vals[idx] || '').trim());

                const div = document.createElement('div');
                div.style = "padding:10px; border-bottom:1px solid #eee; cursor:pointer; text-align:left;";
                div.innerHTML = `<strong>${i+1}. ${displayName}</strong><br><small>${addr}</small>`;
                
                div.onclick = () => {
                    document.getElementById('currentAddress').textContent = addr;
                    document.getElementById('currentPhone').textContent = rowData.Phone || '--';
                    window.openStopModal(displayName, rowData);
                };
                stopList.appendChild(div);
            });
        };

        init();
    })();
    </script>
