<!-- Order Modal -->
<div id="orderModal" class="order-modal">
    <div class="order-content">
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <h2 id="orderCompanyName" style="margin: 0; color: #007bff;">Stop Details</h2>
            <button onclick="document.getElementById('orderModal').style.display='none'" class="btn-top btn-finish">Close</button>
        </div>
        <hr>

        <!-- Customer Info Grid -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; background: #f1f1f1; padding: 15px; border-radius: 8px;">
            <div>
                <strong><i class="fas fa-map-marker-alt"></i> Address:</strong> <span id="modalAddress">--</span><br>
                <strong><i class="fas fa-phone"></i> Phone:</strong> <span id="modalPhone">--</span><br>
                <strong><i class="fas fa-dollar-sign"></i> Delivery Fee:</strong> <span id="modalFee">--</span><br>
                <strong><i class="fas fa-road"></i> Travel:</strong> <span id="modalTravel">--</span>
            </div>
            <div>
                <strong><i class="fas fa-exclamation-circle"></i> Special Instructions:</strong> 
                <p id="modalInstructions" style="margin: 5px 0; color: #d9534f; font-weight: bold;">--</p>
                <strong><i class="fas fa-sticky-note"></i> Notes:</strong> 
                <p id="modalNotes" style="margin: 5px 0;">--</p>
            </div>
        </div>

        <!-- Pre-Ordered Items Section -->
        <div class="product-section" style="border-left: 5px solid #28a745;">
            <div style="color:#28a745; font-weight:bold; margin-bottom:10px;"><i class="fas fa-clipboard-list"></i> Pre-Ordered Items (Call-ins)</div>
            <div id="preOrderDisplay" style="font-style: italic; color: #555;">None</div>
        </div>

        <!-- Shopping Cart (Current Order) -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="product-section">
                <div style="color:#007bff; font-weight:bold; margin-bottom:10px;"><i class="fas fa-tint"></i> Water Products</div>
                <div id="waterBasketItems"></div>
                <button id="addWaterBtn" class="btn-top" style="background:#007bff; width: 100%;">+ Add Another Water Item</button>
            </div>
            <div class="product-section">
                <div style="color:#6f42c1; font-weight:bold; margin-bottom:10px;"><i class="fas fa-coffee"></i> Coffee Products</div>
                <div id="coffeeBasketItems"></div>
                <button id="addCoffeeBtn" class="btn-top" style="background:#6f42c1; width: 100%;">+ Add Another Coffee Item</button>
            </div>
        </div>

        <div style="text-align: right; margin-top: 20px;">
            <button class="btn-top btn-start" style="padding: 12px 30px; font-size: 1rem;">SAVE & COMPLETE DELIVERY</button>
        </div>
    </div>
</div>
