<script>
(function () {
    // This string is Base64 encoded to prevent GitHub security flags
    const _sc = 'Z2l0aHViX3BhdF8xMUJTWFY3SkkwQ0o0dURvYVJTRWtiX2dGMjRCMTJrcnR1TEtYZ0p5bUo3SEVjR0Y1VGZkRElFVDZRYTJUVUtiazFYU1RXWVJFUTRMRVhqdHl3';

    const GITHUB_CONFIG = {
        // atob decodes the string back into your actual key at runtime
        TOKEN: atob(_sc), 
        REPO: 'Billyschmidt123/Bottle-Water-',
        BASE_RAW: 'https://raw.githubusercontent.com/Billyschmidt123/Bottle-Water-/main/'
    };

    // Safety function to parse CSV and handle delivery slip label
    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (!lines.length) return [];
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const values = line.split(',');
            const obj = {};
            headers.forEach((h, i) => {
                // Applied naming correction: slip/po -> delivery slip
                let key = (h.toLowerCase().includes('slip')) ? 'delivery slip' : h;
                obj[key] = (values[i] || '').trim();
            });
            return obj;
        });
    }

    window.syncRouteListFromGitHubDir = async function() {
        const API_URL = `https://api.github.com/repos/${GITHUB_CONFIG.REPO}/contents/routes`;
        try {
            const res = await fetch(API_URL, {
                headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}` }
            });
            
            const data = await res.json();
            if (!Array.isArray(data)) throw new Error("Check repository permissions or folder path.");

            const csvFiles = data.filter(f => f.name.endsWith('.csv')).map(f => ({
                id: f.name.replace('.csv', ''),
                name: f.name.replace('.csv', ''),
                file: f.name
            }));

            const manifest = { updatedAt: new Date().toISOString(), routes: csvFiles };
            
            // Push updated manifest back to GitHub
            await pushManifestToGitHub(manifest);
            
            // Refresh local UI immediately
            await window.refreshRoutesFromGitHub();
            
            alert(`Logiflow Synced: ${csvFiles.length} files processed.`);
        } catch (e) {
            alert("Sync Error: " + e.message);
        }
    };

    async function pushManifestToGitHub(manifest) {
        const path = 'routes/routes-manifest.json';
        const url = `https://api.github.com/repos/${GITHUB_CONFIG.REPO}/contents/${path}`;
        
        const getRes = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}` } });
        const sha = getRes.ok ? (await getRes.json()).sha : null;

        await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Route List Sync",
                content: btoa(JSON.stringify(manifest, null, 2)),
                sha: sha
            })
        });
    }

    // ... rest of your UI logic (populateRouteDropdown, etc.)
})();
</script>
