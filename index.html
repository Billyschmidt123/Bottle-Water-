<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; background: #f4f7f6; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; z-index: 1000; background: white; padding: 0 15px; border-bottom: 2px solid #007bff; display: flex; justify-content: space-between; align-items: center; }
        .app-container { display: flex; width: 100vw; height: calc(100vh - 75px); margin-top: 75px; }
        #mapPanel { flex: 0 0 70%; height: 100%; }
        #map { width: 100%; height: 100%; }
        #sidebar { flex: 0 0 30%; height: 100%; border-left: 2px solid #ccc; overflow-y: auto; background: white; }
        .btn-top { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .mgmt-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .mgmt-table th { background: #007bff; color: white; padding: 10px; position: sticky; top: 0; text-align: left; }
        .mgmt-table td { padding: 8px; border-bottom: 1px solid #ddd; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        .form-group label { font-size: 0.75rem; font-weight: bold; color: #666; }
        .form-group input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="topbar">
        <div>
            <span style="font-weight: bold; color: #007bff;">LogiFlow</span>
            <select id="routeDropdown" style="margin-left:15px; padding: 5px;"></select>
        </div>
        <div style="background:#f8f9fa; padding:8px 20px; border-radius:5px; border:1px solid #ddd;">
            <i class="fas fa-map-marker-alt" style="color:#007bff"></i> <span id="currentAddress">Select a Stop</span>
        </div>
        <div>
            <button id="btnForceRefresh" class="btn-top" style="background: #17a2b8; margin-right: 10px;">REFRESH DATA</button>
            <button id="btnManager" class="btn-top" style="background: #495057;">MANAGER MENU</button>
        </div>
    </header>

    <div class="app-container">
        <div id="mapPanel"><div id="map"></div></div>
        <aside id="sidebar"><div id="stopList" style="padding:15px;"></div></aside>
    </div>

    <div id="mgrModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between;">
                <h2>Customer Maintenance</h2>
                <button onclick="document.getElementById('mgrModal').style.display='none'" class="btn-top" style="background:#dc3545;">Exit</button>
            </div>
            <div id="debugHeaders" style="font-size:0.7rem; color:#888; margin-bottom:10px;"></div>
            <table class="mgmt-table">
                <thead id="custTableHead"></thead>
                <tbody id="custTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="custEditModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px;">
            <h2>Update Customer Info</h2>
            <div id="custFormFields" class="form-grid"></div>
            <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="document.getElementById('custEditModal').style.display='none'" class="btn-top" style="background:#6c757d;">Cancel</button>
                <button id="btnSaveCustData" class="btn-top" style="background:#28a745;">SAVE TO ALL ROUTES</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function() {
        const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
        const token = _k.map(c => String.fromCharCode(c)).join('');
        const repo = 'Billyschmidt123/Bottle-Water-';
        
        let globalCustomers = [];
        let csvHeaders = [];
        let routeDataMap = {}; 

        async function ghGet(path) {
            const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: { 'Authorization': `token ${token}` } });
            return r.ok ? await r.json() : [];
        }

        async function ghPut(path, content, sha) {
            return fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Update`, content: btoa(content), sha: sha })
            });
        }

        async function loadAllCustomers() {
            const files = await ghGet('routes');
            const tbody = document.getElementById('custTableBody');
            tbody.innerHTML = '<tr><td colspan="10">Gathering database...</td></tr>';
            
            globalCustomers = [];
            routeDataMap = {};
            csvHeaders = [];

            for (let f of files) {
                if (!f.name.endsWith('.csv')) continue;
                const resp = await fetch(f.download_url + "?t=" + Date.now());
                const text = await resp.text();
                routeDataMap[f.name] = { text: text, sha: f.sha };
                
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length < 1) continue;

                const currentHeaders = lines[0].split(',').map(h => h.trim());
                if (csvHeaders.length === 0) {
                    csvHeaders = currentHeaders;
                    document.getElementById('custTableHead').innerHTML = `<tr><th>Edit</th>${csvHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;
                    document.getElementById('debugHeaders').innerText = "Headers Found: " + csvHeaders.join(' | ');
                }

                lines.slice(1).forEach(line => {
                    const vals = line.split(',');
                    let rowObj = {};
                    csvHeaders.forEach((h, i) => rowObj[h] = (vals[i] || "").trim());
                    
                    // Identify key columns for matching (Company or Name, and Address)
                    const nameCol = csvHeaders.find(h => ["company", "name", "customer", "cust"].some(word => h.toLowerCase().includes(word)));
                    const addrCol = csvHeaders.find(h => h.toLowerCase().includes("address"));

                    if (rowObj[nameCol] || rowObj[addrCol]) {
                        let match = globalCustomers.find(ex => 
                            (ex[nameCol] || "").toLowerCase() === (rowObj[nameCol] || "").toLowerCase() &&
                            (ex[addrCol] || "").toLowerCase() === (rowObj[addrCol] || "").toLowerCase()
                        );
                        if (match) {
                            if (!match._routes.includes(f.name)) match._routes.push(f.name);
                        } else {
                            rowObj._routes = [f.name];
                            globalCustomers.push(rowObj);
                        }
                    }
                });
            }
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('custTableBody');
            tbody.innerHTML = "";
            if (globalCustomers.length === 0) {
                tbody.innerHTML = "<tr><td colspan='10' style='text-align:center; color:red; padding:20px;'>Error: No customer data detected. Verify Row 1 headers.</td></tr>";
                return;
            }
            globalCustomers.forEach((c, idx) => {
                let row = `<tr><td><button class="btn-top" style="padding:4px;" onclick="openEdit(${idx})">Edit</button></td>`;
                csvHeaders.forEach(h => row += `<td>${c[h] || ''}</td>`);
                tbody.innerHTML += row + '</tr>';
            });
        }

        window.openEdit = function(idx) {
            const cust = globalCustomers[idx];
            const container = document.getElementById('custFormFields');
            container.innerHTML = '';
            csvHeaders.forEach(h => {
                container.innerHTML += `<div class="form-group"><label>${h}</label><input type="text" value="${cust[h] || ''}" id="f_${h}"></div>`;
            });
            document.getElementById('custEditModal').style.display = 'flex';

            document.getElementById('btnSaveCustData').onclick = async () => {
                let updated = {};
                csvHeaders.forEach(h => updated[h] = document.getElementById(`f_${h}`).value);
                
                for (let rFile of cust._routes) {
                    let info = routeDataMap[rFile];
                    let lines = info.text.split('\n').filter(l => l.trim());
                    let newLines = [lines[0]];
                    const nameKey = csvHeaders.find(h => ["company", "name", "customer"].some(word => h.toLowerCase().includes(word)));

                    lines.slice(1).forEach(line => {
                        let v = line.split(',');
                        if (v[csvHeaders.indexOf(nameKey)] === cust[nameKey]) {
                            newLines.push(csvHeaders.map(h => updated[h]).join(','));
                        } else {
                            newLines.push(line);
                        }
                    });
                    await ghPut(`routes/${rFile}`, newLines.join('\n'), info.sha);
                }
                document.getElementById('custEditModal').style.display = 'none';
                loadAllCustomers();
            };
        };

        async function init() {
            const map = L.map('map').setView([55.17, -118.79], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const files = await ghGet('routes');
            const drop = document.getElementById('routeDropdown');
            files.forEach(f => {
                if(f.name.endsWith('.csv')) {
                    const opt = document.createElement('option');
                    opt.value = f.download_url; opt.textContent = f.name.replace('.csv','');
                    drop.appendChild(opt);
                }
            });

            document.getElementById('btnManager').onclick = () => {
                document.getElementById('mgrModal').style.display = 'flex';
                loadAllCustomers();
            };
            document.getElementById('btnForceRefresh').onclick = loadAllCustomers;
        }
        init();
    })();
    </script>
</body>
</html>
