<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System - Build 15</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/theme.css">
    <link rel="stylesheet" href="CSS/map.css">
    
    <style>
        /* --- CORE LAYOUT --- */
        body { 
            display: flex !important; 
            flex-direction: column !important; 
            height: 100vh !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            overflow: hidden !important; 
        }

        /* [FIXED]: ENSURE BARS ARE VISIBLE AND STACKED ABOVE MAP */
        .topbar, .map-header-info { 
            display: flex !important; 
            visibility: visible !important;
            position: relative !important; 
            z-index: 1001 !important;
            background: white !important;
            width: 100% !important;
            flex-shrink: 0 !important; /* Prevents bars from disappearing */
        }

        /* --- PRESERVED EXISTING UI RULES --- */
        .app-container { 
            flex: 1 !important; 
            display: flex !important; 
            flex-direction: row !important; 
            width: 100% !important; 
            height: 100% !important;
            overflow: hidden !important; 
        }

        #mapPanel { 
            flex: 0 0 70% !important; 
            height: 100% !important; 
            position: relative !important; 
        }

        #map { 
            width: 100% !important; 
            height: 100% !important; 
            background-color: #ddd; 
        }

        #sidebar { 
            flex: 0 0 30% !important; 
            height: 100% !important; 
            border-left: 1px solid #ccc !important; 
            overflow-y: auto !important; 
            background: #f9f9f9 !important; 
        }

        .manager-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .manager-menu-content { background: white; padding: 30px; border-radius: 8px; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 20px; font-size: 1.1rem; border: none; border-radius: 5px; cursor: pointer; background: #007bff; color: white; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .menu-btn:hover { background: #0056b3; }
        .close-btn { background: #dc3545; margin-top: 20px; padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .build-tag { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; z-index: 9999; }
    </style>
</head>
<body>

    <!-- [RESTORED]: TOP BUTTON BAR -->
    <header class="topbar">
        <div style="padding: 10px; display: flex; align-items: center; gap: 15px; width: 100%;">
            <strong style="font-size: 1.2rem;">LogiFlow</strong>
            <select id="routeSelect" style="padding: 5px;">
                <option value="">-- Select Route --</option>
            </select>
            <button style="padding: 5px 10px; background: #28a745; color: white; border: none; border-radius: 3px;">START ROUTE</button>
            <button style="padding: 5px 10px; background: #dc3545; color: white; border: none; border-radius: 3px;">FINISH ROUTE</button>
            <button style="padding: 5px 10px; background: #17a2b8; color: white; border: none; border-radius: 3px;">DIRECTIONS</button>
            <button style="padding: 5px 10px; background: #6f42c1; color: white; border: none; border-radius: 3px;">OPTIMIZE ROUTE</button>
            <div style="margin-left: auto; display: flex; gap: 15px; font-size: 0.9rem;">
                <span><i class="fas fa-user-shield"></i> Manager Portal</span>
                <span onclick="location.reload()" style="cursor:pointer;"><i class="fas fa-sync"></i> Force Refresh</span>
            </div>
        </div>
    </header>

    <!-- [RESTORED]: ADDRESS & PHONE BAR -->
    <div class="map-header-info" style="border-top: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center;">
        <div><i class="fas fa-map-marker-alt"></i> <strong>Address:</strong> <span id="currentAddress">Select a stop...</span></div>
        <div><i class="fas fa-phone"></i> <strong>Phone:</strong> <span id="currentPhone">--</span></div>
    </div>

    <div class="build-tag">Build 15-FIXED</div>

    <div class="app-container">
        <div id="mapPanel">
            <div id="map"></div>
        </div>
        <aside id="sidebar">
            <div id="sidebarContent" style="padding: 20px; text-align: center;">
                <strong>LogiFlow Active</strong><br>
                Select a route to begin.
            </div>
        </aside>
    </div>

    <div id="managerOverlay" class="manager-overlay">
        <div class="manager-menu-content">
            <h2 style="text-align: center;">Manager Portal</h2>
            <div class="menu-grid">
                <button class="menu-btn"><i class="fas fa-box"></i> Products</button>
                <button class="menu-btn"><i class="fas fa-users"></i> Customers</button>
            </div>
            <div style="text-align: center;"><button class="close-btn">Exit</button></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="JS/map.js"></script>

    <script>

            if (window.map) window.map.invalidateSize();
        });

    </script>
</body>
</html>
