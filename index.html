<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; background: #f4f7f6; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; z-index: 1000; background: white; padding: 0 15px; border-bottom: 2px solid #007bff; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .app-container { display: flex; width: 100vw; height: calc(100vh - 75px); margin-top: 75px; }
        #mapPanel { flex: 0 0 70%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; }
        #sidebar { flex: 0 0 30%; height: 100%; border-left: 2px solid #ccc; overflow-y: auto; background: #ffffff; }
        .btn-top { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; }
        #sig-canvas { border: 2px dotted #CCCCCC; border-radius: 5px; background: #eee; width: 100%; height: 150px; cursor: crosshair; }
        #pdf-template { display: none; width: 8.5in; background: white; padding: 0.4in; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <span style="font-weight: bold; color: #007bff;">LogiFlow</span>
            <select id="routeDropdown" style="margin-left:15px; padding: 5px; border-radius: 4px; border: 1px solid #ccc;"></select>
        </div>
        <div class="topbar-right">
            <button id="btnManager" class="btn-top" style="background: #495057;">MANAGER MENU</button>
        </div>
    </header>

    <div class="app-container">
        <div id="mapPanel"><div id="map"></div></div>
        <aside id="sidebar">
            <div id="stopList" style="padding:15px; text-align:center; color:#999;">Select a route to begin.</div>
        </aside>
    </div>

    <div id="stopModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h2 id="stopModalTitle">Complete Delivery</h2>
                <button onclick="document.getElementById('stopModal').style.display='none'" class="btn-top" style="background:#dc3545;">Close</button>
            </div>
            <hr>
            <div style="margin: 15px 0;">
                <label>Received By (Required)</label>
                <input type="text" id="receivedBy" placeholder="Name of person receiving" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="margin: 15px 0;">
                <label>Signature</label>
                <canvas id="sig-canvas"></canvas>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="document.getElementById('stopModal').style.display='none'" class="btn-top" style="background:#6c757d;">Cancel</button>
                <button class="btn-top" onclick="validateAndFinishStop()" style="background:#28a745;">FINISH STOP</button>
            </div>
        </div>
    </div>

    <div id="pdf-template">
        <h1 style="text-align:center;">CULLIGAN DELIVERY SLIP</h1>
        <div id="pdfBody"></div>
        <img id="pdfSigImage" style="max-height: 1in; margin-top: 20px;">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function() {
        const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
        const token = _k.map(c => String.fromCharCode(c)).join('');
        const repo = 'Billyschmidt123/Bottle-Water-';

        async function uploadPDFToGithub(blob, fileName) {
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64data = reader.result.split(',')[1];
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Save Slip ${fileName}`, content: base64data })
                });
                if (response.ok) {
                    alert("Sequence saved to GitHub successfully.");
                    document.getElementById('stopModal').style.display = 'none';
                }
            };
        }

        window.validateAndFinishStop = async function() {
            const slipNum = "1000"; 
            const fileName = `Delivery_Slip_${slipNum}.pdf`;
            const element = document.getElementById('pdf-template');
            element.style.display = 'block';
            
            const canvas = document.getElementById('sig-canvas');
            document.getElementById('pdfSigImage').src = canvas.toDataURL();

            const opt = { margin: 0.5, filename: fileName, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter' } };
            const pdfBlob = await html2pdf().set(opt).from(element).output('blob');
            element.style.display = 'none';
            uploadPDFToGithub(pdfBlob, fileName);
        };

        async function init() {
            const map = L.map('map').setView([55.17, -118.79], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
        init();
    })();
    </script>
</body>
</html>
