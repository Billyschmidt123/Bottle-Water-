<!-- 
  PROJECT: LogiFlow Delivery System
  VERSION: Unified Cloud Operations & PDF Archiving + Preview Approval
  FEATURES: GitHub Persistence, Route Optimization, Tech Dispatch, Document Verification
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow Delivery System</title>
    
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; background: #f4f7f6; }
        .topbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; z-index: 1000; background: white; padding: 0 15px; border-bottom: 2px solid #007bff; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .topbar-center { flex-grow: 1; display: flex; justify-content: center; gap: 25px; font-size: 0.9rem; color: #333; background: #f8f9fa; margin: 0 20px; padding: 8px 15px; border-radius: 5px; border: 1px solid #ddd; }
        .app-container { display: flex; width: 100vw; height: calc(100vh - 75px); margin-top: 75px; }
        #mapPanel { flex: 0 0 70%; height: 100%; position: relative; background: #e0e0e0; }
        #map { width: 100%; height: 100%; }
        #sidebar { flex: 0 0 30%; height: 100%; border-left: 2px solid #ccc; overflow-y: auto; background: #ffffff; }
        .btn-top { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto; }
        
        /* Stop/Delivery Styling */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; color: #666; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        #sig-canvas { border: 2px dotted #CCCCCC; border-radius: 5px; cursor: crosshair; background: #eee; width: 100%; height: 150px; touch-action: none; }
        
        .cart-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        .cart-table th { background: #eee; text-align: left; padding: 5px; }
        .cart-table td { border-bottom: 1px solid #eee; padding: 5px; }
        
        /* Manager Styling */
        .mgmt-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .mgmt-table th { background: #007bff; color: white; text-align: left; padding: 10px; }
        .mgmt-table td { padding: 8px; border-bottom: 1px solid #ddd; }

        /* --- ADDITION: PREVIEW UI --- */
        #pdfPreviewOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        #pdfPreviewFrame { width: 80%; height: 80%; border: none; background: white; border-radius: 8px; }
        .preview-controls { margin-top: 15px; display: flex; gap: 20px; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">
            <span style="font-weight: bold; color: #007bff; margin-right: 15px;">LogiFlow</span>
            <select id="routeDropdown" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">Select Route...</option>
            </select>
        </div>
        <div class="topbar-center">
            <div><i class="fas fa-map-marker-alt" style="color:#007bff"></i> <span id="currentAddress">Awaiting Data...</span></div>
            <div><i class="fas fa-truck" style="color:#28a745"></i> <span id="currentTech">No Tech Assigned</span></div>
        </div>
        <div class="topbar-right">
            <button id="btnManager" class="btn-top" style="background: #495057;">MANAGER MENU</button>
        </div>
    </header>

    <div class="app-container">
        <div id="mapPanel"><div id="map"></div></div>
        <aside id="sidebar">
            <div id="sidebarContent" style="padding: 10px;">
                <h3 style="text-align: center; color: #444;">Daily Route</h3>
                <div id="stopList" style="text-align:center; color:#999; margin-top:20px;">Select a route to view stops.</div>
            </div>
        </aside>
    </div>

    <!-- Stop Modal -->
    <div id="stopModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h2 id="stopModalTitle">Complete Delivery</h2>
                <button onclick="document.getElementById('stopModal').style.display='none'" class="btn-top" style="background:#dc3545;">Close</button>
            </div>
            <hr>
            
            <div id="stopMetadata" style="font-size: 0.85rem; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><strong>Address:</strong> <span id="metaAddress">--</span></div>
                <div><strong>Phone:</strong> <span id="metaPhone">--</span></div>
                <div style="grid-column: span 2;"><strong>Special Instructions:</strong> <span id="metaInstructions">--</span></div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Products</label>
                    <div style="display:flex; gap:5px;">
                        <select id="stopProductDropdown" style="flex-grow:1;"></select>
                        <input type="number" id="qtyProd" style="width:50px;" value="1">
                        <button class="btn-top" onclick="addToCart()" style="background:#28a745;">ADD</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Signature (Printed Record Only)</label>
                    <canvas id="sig-canvas"></canvas>
                    <button class="btn-top" onclick="clearSig()" style="background:#6c757d; margin-top:5px;">Clear</button>
                </div>
                <div class="form-group">
                    <label>Received By</label>
                    <input type="text" id="receivedBy" placeholder="Print Name">
                </div>
                <div class="form-group">
                    <label>Delivery Status</label>
                    <select id="deliveryStatus">
                        <option value="delivered">Delivered</option>
                        <option value="not_delivered">Not Delivered</option>
                    </select>
                </div>
            </div>

            <table class="cart-table">
                <thead><tr><th>Item</th><th>Qty</th><th>Action</th></tr></thead>
                <tbody id="cartItemsBody"></tbody>
            </table>

            <div style="margin-top:20px; display:flex; justify-content:flex-end;">
                <button class="btn-top" id="btnFinish" onclick="processFinalDelivery()" style="background:#28a745; padding: 15px 30px;">GENERATE PREVIEW</button>
            </div>
        </div>
    </div>

    <!-- Manager Modal -->
    <div id="mgrModal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h2>Manager Control Panel</h2>
                <button onclick="document.getElementById('mgrModal').style.display='none'" class="btn-top" style="background:#dc3545;">Exit</button>
            </div>
            <hr>
            <div style="margin-bottom: 20px; background: #e9ecef; padding: 15px; border-radius: 4px; display: flex; align-items: center; gap: 15px;">
                <label style="font-weight: bold;">Starting Slip Number:</label>
                <input type="number" id="startSlipNum" style="width: 120px; padding: 8px;">
                <button class="btn-top" onclick="saveSlipNumberToGitHub()">Sync Cloud Sequence</button>
            </div>
            
            <div id="techManagement">
                <h4 style="margin: 0 0 10px 0;">Technician Assignments</h4>
                <div id="techListContainer" style="display:flex; flex-wrap: wrap; gap:10px;">
                    <!-- Dave, Steven, Rig, Robin, Daniel, Ezra, Jim, Al Perry -->
                </div>
            </div>
        </div>
    </div>

    <!-- --- ADDITION: PREVIEW OVERLAY HTML --- -->
    <div id="pdfPreviewOverlay">
        <iframe id="pdfPreviewFrame"></iframe>
        <div class="preview-controls">
            <button class="btn-top" id="btnCancelPreview" style="background:#6c757d; padding: 12px 24px;">Return to Edit</button>
            <button class="btn-top" id="btnConfirmArchive" style="background:#28a745; padding: 12px 24px;">Confirm & Archive to GitHub</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function() {
        const _k = [103,105,116,104,117,98,95,112,97,116,95,49,49,66,83,88,86,55,74,73,48,113,121,120,100,49,112,67,82,87,90,66,68,95,71,106,53,113,100,67,97,55,107,110,65,98,113,121,74,97,51,66,74,106,108,112,110,120,72,65,85,81,69,90,113,102,113,88,102,53,71,116,89,69,85,112,72,55,89,84,54,67,67,73,70,121,100,105,51,86,110,79,122];
        const token = _k.map(c => String.fromCharCode(c)).join('');
        const repo = 'Billyschmidt123/Bottle-Water-';
        
        let currentSlipVal = 100000;
        let currentSlipSHA = '';
        let deliveryCart = [];
        const techs = ["Dave", "Steven", "Rig", "Robin", "Daniel", "Ezra", "Jim", "Al Perry"];

        // --- ADDITION: PERSISTENCE FOR PREVIEW ---
        let pendingPdfData = null;
        let pendingFileName = "";

        // Cloud Sequence Sync
        async function syncSlipNumber() {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/System/SlipCounter.txt`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if(res.ok) {
                const data = await res.json();
                currentSlipSHA = data.sha;
                currentSlipVal = parseInt(atob(data.content));
                document.getElementById('startSlipNum').value = currentSlipVal;
            }
        }

        window.saveSlipNumberToGitHub = async function(manualVal) {
            const val = manualVal || document.getElementById('startSlipNum').value;
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/System/SlipCounter.txt`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Sync Slip Sequence",
                    content: btoa(val.toString()),
                    sha: currentSlipSHA || undefined
                })
            });
            if(res.ok) {
                const data = await res.json();
                currentSlipSHA = data.content.sha;
                currentSlipVal = parseInt(val);
            }
        };

        // --- ADDITION: SEPARATED PREVIEW FROM ARCHIVE ---
        async function processFinalDelivery() {
            const receiver = document.getElementById('receivedBy').value;
            if(!receiver) return alert("Please print recipient name.");

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const now = new Date();
                const dateLong = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                const company = document.getElementById('stopModalTitle').textContent.replace('Delivery: ', '');
                
                doc.setFontSize(18); doc.text("Culligan Water Delivery", 10, 20);
                doc.setFontSize(10); doc.text(`Slip #: ${currentSlipVal}`, 150, 20);
                doc.text(`Date: ${dateLong}`, 10, 30);
                doc.text(`Customer: ${company}`, 10, 40);
                
                let y = 60;
                deliveryCart.forEach(item => {
                    doc.text(`${item.qty} x ${item.name}`, 15, y);
                    y += 7;
                });

                doc.text(`Received By: ${receiver}`, 10, y + 20);
                const sigData = document.getElementById('sig-canvas').toDataURL('image/png');
                doc.addImage(sigData, 'PNG', 10, y + 25, 50, 20);

                // Store for later upload
                pendingPdfData = doc.output('datauristring').split(',')[1];
                pendingFileName = `${company.replace(/\s+/g, '_')}-Del_slip_number(${currentSlipVal})-${dateLong.replace(/\s+/g, '_')}.pdf`;

                // Show Preview Overlay
                document.getElementById('pdfPreviewFrame').src = doc.output('datauristring');
                document.getElementById('pdfPreviewOverlay').style.display = 'flex';

            } catch (e) {
                console.error(e);
                alert("Preview Generation Error.");
            }
        }

        // --- ADDITION: ARCHIVE EXECUTION ---
        window.executeCloudArchive = async function() {
            const btn = document.getElementById('btnConfirmArchive');
            btn.disabled = true;
            btn.textContent = "UPLOADING...";

            try {
                const uploadRes = await fetch(`https://api.github.com/repos/${repo}/contents/Pdf/${pendingFileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Archive: ${pendingFileName}`, content: pendingPdfData })
                });

                if(uploadRes.ok) {
                    currentSlipVal++;
                    await saveSlipNumberToGitHub(currentSlipVal);
                    alert("Archived in GitHub Pdf folder.");
                    document.getElementById('pdfPreviewOverlay').style.display = 'none';
                    document.getElementById('stopModal').style.display = 'none';
                } else {
                    alert("Upload Failed. Check GitHub connection.");
                }
            } finally {
                btn.disabled = false;
                btn.textContent = "Confirm & Archive to GitHub";
            }
        };

        function init() {
            const map = L.map('map').setView([55.17, -118.79], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            syncSlipNumber();
            setupSignature();
            renderTechs();

            // --- ADDITION: BUTTON BINDINGS ---
            document.getElementById('btnCancelPreview').onclick = () => {
                document.getElementById('pdfPreviewOverlay').style.display = 'none';
            };
            document.getElementById('btnConfirmArchive').onclick = () => {
                executeCloudArchive();
            };
        }

        function renderTechs() {
            const container = document.getElementById('techListContainer');
            techs.forEach(t => {
                const b = document.createElement('button');
                b.className = 'btn-top'; b.style.background = '#6c757d'; b.textContent = t;
                b.onclick = () => {
                    document.getElementById('currentTech').textContent = t;
                    alert(`Assigned to ${t}`);
                };
                container.appendChild(b);
            });
        }

        function setupSignature() {
            const canvas = document.getElementById('sig-canvas');
            const ctx = canvas.getContext('2d');
            let drawing = false;
            canvas.onmousedown = () => { drawing = true; ctx.beginPath(); };
            canvas.onmouseup = () => drawing = false;
            canvas.onmousemove = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };
        }

        window.clearSig = () => {
            const c = document.getElementById('sig-canvas');
            c.getContext('2d').clearRect(0,0,c.width,c.height);
        };

        document.getElementById('btnManager').onclick = () => document.getElementById('mgrModal').style.display = 'flex';

        init();
    })();
    </script>
</body>
</html>
