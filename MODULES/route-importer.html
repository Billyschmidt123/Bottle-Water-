<div class="modal">
    <div class="modal-header">
        <h2>Bulk Route Importer & GitHub Sync</h2>
    </div>

    <div class="modal-body">
        <p style="color: #d9534f; font-weight: bold;">⚠️ WARNING: Uploading will overwrite existing files on GitHub. Ensure you have a backup of your local CSVs first.</p>
        
        <label>GitHub Personal Access Token:</label>
        <input type="password" id="ghToken" placeholder="paste token here" style="width:100%; margin-bottom:10px;">
        
        <hr>

        <label>Select CSV Route Files:</label>
        <input type="file" id="bulkCsvInput" multiple accept=".csv" style="margin-bottom: 20px; width: 100%;">
        
        <div id="importStatus" style="margin-bottom: 15px; font-size: 0.9em;"></div>

        <div id="fileCheckList" style="margin-bottom:15px; max-height: 150px; overflow-y: auto; border: 1px solid #ddd; padding: 5px; display:none;">
            <strong>Files to be processed:</strong>
            <ul id="pendingFilesList" style="font-size: 0.85em; padding-left: 20px;"></ul>
        </div>
        
        <div style="margin-top: 15px;">
            <button id="btnSyncToGithub" class="btn-primary" style="width: 100%; margin-bottom: 10px;">Sync to GitHub (Master List)</button>
            <button id="btnSaveLocal" class="btn-secondary" style="width: 100%;">Save Local Only (Testing)</button>
        </div>
    </div>

    <div class="modal-footer">
        <button class="btn-danger" onclick="closeModal()">Back to Manager</button>
    </div>
</div>

<script>
(function() {
    const csvInput = document.getElementById('bulkCsvInput');
    const status = document.getElementById('importStatus');
    const list = document.getElementById('pendingFilesList');
    const listDiv = document.getElementById('fileCheckList');
    
    // Repository Config (Adjust these to match your repo)
    const owner = "Billyschmidt123";
    const repo = "Bottle-Water-";
    const branch = "main";

    let filesToUpload = [];

    csvInput.addEventListener('change', function(e) {
        filesToUpload = Array.from(e.target.files);
        list.innerHTML = "";
        if(filesToUpload.length > 0) {
            listDiv.style.display = "block";
            filesToUpload.forEach(f => {
                const li = document.createElement('li');
                li.textContent = f.name;
                list.appendChild(li);
            });
            status.textContent = filesToUpload.length + " files selected.";
        }
    });

    async function getSha(path, token) {
        try {
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                return data.sha;
            }
            return null;
        } catch (e) { return null; }
    }

    async function uploadFile(path, content, token, isBinary = false) {
        const sha = await getSha(path, token);
        const body = {
            message: `Update ${path} via LogiFlow Manager`,
            content: isBinary ? content : btoa(content),
            branch: branch
        };
        if (sha) body.sha = sha;

        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: 'PUT',
            headers: { 
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });
        return res.ok;
    }

    document.getElementById('btnSyncToGithub').addEventListener('click', async function() {
        const token = document.getElementById('ghToken').value;
        if (!token) return alert("Please enter your GitHub Token.");
        if (filesToUpload.length === 0) return alert("Select files first.");

        const confirmSync = confirm("This will overwrite existing routes on GitHub. Are you sure you want to proceed?");
        if (!confirmSync) return;

        status.textContent = "Checking GitHub for existing files...";
        
        let manifestRoutes = [];

        for (let file of filesToUpload) {
            const path = "routes/" + file.name;
            const routeName = file.name.replace(".csv", "");
            
            status.textContent = "Uploading: " + file.name + "...";
            const reader = new FileReader();
            
            const content = await new Promise((resolve) => {
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsText(file);
            });

            const success = await uploadFile(path, content, token);
            if (success) {
                manifestRoutes.push({
                    id: routeName.toLowerCase().replace(/\s+/g, '-'),
                    name: routeName,
                    file: path
                });
            }
        }

        // Final Manifest Update
        status.textContent = "Updating Master Manifest...";
        const manifestJson = JSON.stringify({ routes: manifestRoutes }, null, 4);
        const manifestSuccess = await uploadFile("ROUTES/routes-manifest.json", manifestJson, token);

        if (manifestSuccess) {
            status.textContent = "SUCCESS: GitHub Master List updated!";
            alert("All files uploaded. Your team can now use 'Refresh' to see the changes.");
        } else {
            alert("Files uploaded, but failed to update Master Manifest.");
        }
    });

    document.getElementById('btnSaveLocal').addEventListener('click', function() {
        // Preserves existing local-only logic
        alert("Local Save functionality remains as fallback.");
    });
})();
</script>
