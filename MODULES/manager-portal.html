<div class="modal">
    <div class="modal-header">
        <h2>Manager Portal</h2>
    </div>

    <div class="modal-body">

        <!-- ROUTE IMPORT SECTION -->
        <h3>Route Import</h3>

        <button id="btnImportRoutes" class="btn-primary" style="width:100%; margin-bottom:10px;">
            Load routes
        </button>

        <label for="routeDropdown">Available Routes</label>
        <select id="routeDropdown" style="width:100%; margin-bottom:20px;">
            <option value="">-- Select a route --</option>
        </select>

        <hr>

        <!-- OTHER MANAGER SECTIONS (PLACEHOLDERS) -->
        <h3>Products</h3>
        <button class="btn-secondary" style="width:100%; margin-bottom:10px;">Manage Products</button>

        <h3>Call-In Orders</h3>
        <button class="btn-secondary" style="width:100%; margin-bottom:10px;">View Call-In Orders</button>

        <h3>End of Day</h3>
        <button class="btn-secondary" style="width:100%; margin-bottom:10px;">Run End of Day</button>

    </div>

    <div class="modal-footer">
        <button class="btn-danger" onclick="closeModal()">Close</button>
    </div>
</div>
