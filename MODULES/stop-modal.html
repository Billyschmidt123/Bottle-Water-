<div class="modal">
    <div class="modal-header">
        <div><strong>{{COMPANY}}</strong></div>
        <div>{{ADDRESS_HEADER}}</div>
        <div>{{PHONE}}</div>
    </div>

    <div class="modal-body">
        <div style="margin-bottom:10px;">
            <label>Email</label>
            <input type="email" id="stopEmail" style="width:100%;" value="{{EMAIL}}">
        </div>

        <div style="margin-bottom:10px;">
            <label>Delivery fee / travel</label>
            <div style="display:flex; gap:6px;">
                <input type="text" id="stopDeliveryFee" placeholder="Delivery fee" style="flex:1;" value="{{DELIVERY_FEE}}">
                <input type="text" id="stopTravel" placeholder="Travel" style="flex:1;" value="{{TRAVEL}}">
            </div>
        </div>

        <div style="margin-bottom:10px;">
            <label>Special instructions</label>
            <textarea id="stopSpecialInstructions" style="width:100%; height:60px;">{{SPECIAL_INSTRUCTIONS}}</textarea>
        </div>

        <div style="margin-bottom:10px;">
            <label>Water products</label>
            <select id="waterProducts" style="width:100%;"></select>
        </div>

        <div style="margin-bottom:10px;">
            <label>Coffee products</label>
            <select id="coffeeProducts" style="width:100%;"></select>
        </div>

        <div style="margin-bottom:10px;">
            <label>Received by</label>
            <input type="text" id="stopReceivedBy" style="width:100%;" value="{{RECEIVED_BY}}">
        </div>

        <div style="margin-bottom:10px;">
            <label>Signature</label>
            <div style="position:relative; border:1px solid #ccc; height:120px;">
                <canvas id="signatureCanvas" width="400" height="120" style="width:100%; height:100%;"></canvas>
                <div id="signatureHint" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#999; pointer-events:none;">
                    Sign here
                </div>
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button id="btnSaveAndReceipt" class="btn-success">Save and create delivery receipt</button>
        <button id="btnNotDelivered" class="btn-danger">Not delivered</button>
        <button class="btn-warning" onclick="closeModal()">Close</button>
    </div>
</div>
