<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Call-In Order Entry</title> <style> body { font-family: 'Segoe UI', Tahoma, sans-serif; background:#f4f7f9; margin:0; padding:20px; } h1 { margin-top:0; } .section { background:#fff; padding:15px; border-radius:6px; margin-bottom:20px; border:1px solid #ddd; } .form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; } .form-group { display:flex; flex-direction:column; } .form-group label { font-size:0.85rem; margin-bottom:4px; color:#444; } .form-group input, .form-group select { padding:8px; border:1px solid #ccc; border-radius:4px; } table { width:100%; border-collapse:collapse; margin-top:10px; } th, td { border-bottom:1px solid #eee; padding:8px; } th { background:#f0f0f0; } .btn { padding:10px 16px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; } .btn-primary { background:#007bff; color:#fff; } .btn-danger { background:#dc3545; color:#fff; } .btn-add { background:#28a745; color:#fff; } </style> </head> <body> <h1>Call-In Order Entry</h1>

<div class="section"> <h3>Customer Information</h3> <div class="form-grid"> <div class="form-group"><label>Company</label><input id="ci_company"></div> <div class="form-group"><label>Address</label><input id="ci_address"></div> <div class="form-group"><label>City</label><input id="ci_city"></div> <div class="form-group"><label>Postal Code</label><input id="ci_postal"></div> <div class="form-group"><label>Province</label><input id="ci_province"></div> <div class="form-group"><label>Location</label><input id="ci_location"></div> <div class="form-group"><label>Phone</label><input id="ci_phone"></div> <div class="form-group"><label>Email</label><input id="ci_email"></div> <div class="form-group"><label>Notes</label><input id="ci_notes"></div> <div class="form-group"><label>Special Instructions</label><input id="ci_special"></div> <div class="form-group"><label>Longitude (locked)</label><input id="ci_long" readonly></div> <div class="form-group"><label>Latitude (locked)</label><input id="ci_lat" readonly></div> <div class="form-group"><label>Delivery Charge</label><input id="ci_delcharge"></div> <div class="form-group"><label>Travel</label><input id="ci_travel"></div> <div class="form-group"><label>Purchase Order</label><input id="ci_po"></div> <div class="form-group"><label>Special Order</label><input id="ci_specorder"></div> </div> </div>

<div class="section"> <h3>Product Entry</h3> <div class="form-grid"> <div class="form-group"><label>Water Products</label><select id="ci_water"></select></div> <div class="form-group"><label>Coffee Products</label><select id="ci_coffee"></select></div> <div class="form-group"><label>Quantity</label><input type="number" id="ci_qty" value="1"></div> <div class="form-group"><label>Units</label><select id="ci_units"></select></div> </div> <button class="btn btn-add" onclick="addItem()">Add Item</button>

<table> <thead><tr><th>Item</th><th>Qty</th><th>Units</th><th>Action</th></tr></thead> <tbody id="cartBody"></tbody> </table> </div>

<div class="section"> <h3>Route & Delivery Date</h3> <div class="form-grid"> <div class="form-group"><label>Target Route</label><select id="ci_route"></select></div> <div class="form-group"><label>Target Delivery Date</label><input type="date" id="ci_targetdate"></div> </div> </div>

<div class="section"> <button class="btn btn-primary" onclick="submitCallIn()">Submit Call-In Order</button> </div>

<script> let cart = [];

function addItem(){ const item = document.getElementById('ci_water').value || document.getElementById('ci_coffee').value; const qty = document.getElementById('ci_qty').value; const units = document.getElementById('ci_units').value; if(!item) return; cart.push({item, qty, units}); renderCart(); }

function renderCart(){ const body = document.getElementById('cartBody'); body.innerHTML = cart.map((c,i)=>  <tr>  <td>${c.item}</td><td>${c.qty}</td><td>${c.units}</td>  <td><button class='btn btn-danger' onclick='removeItem(${i})'>X</button></td>  </tr>).join(''); }

function removeItem(i){ cart.splice(i,1); renderCart(); }

function submitCallIn(){ alert("Order created"); alert("Order injected"); alert("Manager confirmed stop list"); } </script>

</body> </html>
