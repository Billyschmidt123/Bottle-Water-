<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Call-In Order</title>
    <style>
        /* Scoped to Call-In modal to avoid leaking styles */
        .callin-modal-container {
            padding: 20px;
            color: #333;
            font-family: sans-serif;
        }

        .callin-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .callin-modal-header h2 {
            margin: 0;
        }

        .close-modal-btn,
        .back-panel-btn {
            font-size: 0.9rem;
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            color: #555;
            padding: 6px 10px;
            margin-left: 8px;
        }

        .close-modal-btn {
            font-size: 1.5rem;
            border: none;
            padding: 0 6px;
        }

        .callin-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-group label {
            display: block;
            font-weight: bold;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value,
        .info-input {
            font-size: 1rem;
            font-weight: 500;
        }

        .info-input input,
        .info-input textarea,
        .info-input select {
            width: 100%;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .info-input textarea {
            resize: vertical;
            min-height: 60px;
        }

        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        .order-section {
            margin-top: 10px;
        }

        .order-section h3 {
            margin: 0 0 10px 0;
        }

        .order-controls {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .order-controls select,
        .order-controls input {
            width: 100%;
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .order-controls button {
            padding: 8px 10px;
            border-radius: 4px;
            border: none;
            background: #007bff;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .order-table th {
            text-align: left;
            background: #f4f4f4;
            padding: 10px;
        }

        .order-table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .order-table button {
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            background: #dc3545;
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .route-date-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .route-date-grid .info-group {
            margin-bottom: 0;
        }

        .modal-footer-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .action-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn { background: #28a745; color: white; }
        .cancel-btn { background: #6c757d; color: white; }

        .small-note {
            font-size: 0.8rem;
            color: #777;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="callin-modal-container">
    <div class="callin-modal-header">
        <h2>Call-In Order</h2>
        <div>
            <button class="back-panel-btn" onclick="ci_backToManagerPanel()">Back to Manager Panel</button>
            <button class="close-modal-btn" onclick="ci_closeCallInModal()">&times;</button>
        </div>
    </div>

    <div class="callin-info-grid">
        <!-- Customer / Call-In Details -->
        <div>
            <div class="info-group">
                <label>Customer Name</label>
                <div class="info-input">
                    <input type="text" id="ciCustomerName" placeholder="Customer / Account Name">
                </div>
            </div>

            <div class="info-group">
                <label>Delivery Address</label>
                <div class="info-input">
                    <input type="text" id="ciAddress" placeholder="Street, City, etc.">
                </div>
            </div>

            <div class="info-group">
                <label>Contact Phone</label>
                <div class="info-input">
                    <input type="text" id="ciPhone" placeholder="Contact phone number">
                </div>
            </div>

            <div class="info-group">
                <label>Contact Name</label>
                <div class="info-input">
                    <input type="text" id="ciContact" placeholder="Person placing the call-in">
                </div>
            </div>
        </div>

        <!-- Metadata / Notes -->
        <div>
            <div class="info-group">
                <label>Call-In Notes</label>
                <div class="info-input">
                    <textarea id="ciNotes" placeholder="Special instructions, gate codes, etc."></textarea>
                </div>
            </div>

            <div class="info-group">
                <label>Created At</label>
                <div id="ciCreatedAt" class="info-value">--</div>
                <div class="small-note">Auto-filled when this screen loads.</div>
            </div>
        </div>
    </div>

    <hr>

    <!-- Product / Order Section -->
    <div class="order-section">
        <h3>Order Items</h3>

        <div class="order-controls">
            <select id="ciProductWater">
                <option value="">Water Products...</option>
            </select>
            <select id="ciProductCoffee">
                <option value="">Coffee Products...</option>
            </select>
            <input type="number" id="ciQty" min="1" placeholder="Qty">
            <select id="ciUnit">
                <option value="">Units...</option>
            </select>
            <button type="button" onclick="ci_addItemToCart()">Add</button>
        </div>
        <div class="small-note">
            Select either a Water or Coffee product, enter quantity and units, then click Add.
        </div>

        <table class="order-table">
            <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Units</th>
                <th>Source</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="ciCartBody">
            <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>

    <div class="route-date-grid">
        <div class="info-group">
            <label>Target Route</label>
            <div class="info-input">
                <select id="ciRouteSelect">
                    <option value="">Select route...</option>
                </select>
            </div>
            <div class="small-note">Routes are loaded from the /routes folder in GitHub.</div>
        </div>

        <div class="info-group">
            <label>Target Delivery Date</label>
            <div class="info-input">
                <input type="date" id="ciTargetDate">
            </div>
            <div class="small-note">This will be used in the Call-In file name.</div>
        </div>
    </div>

    <div class="modal-footer-actions">
        <button class="action-btn submit-btn" onclick="ci_submitCallInOrder()">
            Submit Call-In Order
        </button>
        <button class="action-btn cancel-btn" onclick="ci_closeCallInModal()">
            Cancel
        </button>
    </div>
</div>

<script>
    (function () {
        // Inherit GitHub context from parent (index.html)
        const repo   = (window.parent && window.parent.repo)   ? window.parent.repo   : 'Billyschmidt123/Bottle-Water-';
        const branch = (window.parent && window.parent.branch) ? window.parent.branch : 'main';
        const token  = (window.parent && window.parent.token)  ? window.parent.token  : null;

        const rawBaseUrl = 'https://raw.githubusercontent.com/' + repo + '/' + branch + '/';
        const apiBaseUrl = 'https://api.github.com/repos/' + repo + '/contents/';

        let ciCart = [];
        let ciUnitOptions = new Set();

        document.addEventListener('DOMContentLoaded', function () {
            ci_initCreatedAt();
            ci_loadProducts();
            ci_loadRoutes();
        });

        function ci_initCreatedAt() {
            const el = document.getElementById('ciCreatedAt');
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            el.textContent = now.toLocaleString(undefined, options);
        }

        function ci_loadProducts() {
            ci_loadProductFile('Products/Water.csv', 'ciProductWater', 'Water');
            ci_loadProductFile('Products/Coffee.csv', 'ciProductCoffee', 'Coffee');
        }

        function ci_loadProductFile(path, selectId, sourceLabel) {
            fetch(rawBaseUrl + path)
                .then(r => {
                    if (!r.ok) throw new Error('Failed to load ' + path);
                    return r.text();
                })
                .then(text => {
                    const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
                    if (lines.length < 2) return;

                    const headers = lines[0].split(',').map(h => h.trim());
                    const descIndex = ci_findDescriptionIndex(headers);
                    ci_collectUnitHeaders(headers);

                    const select = document.getElementById(selectId);
                    lines.slice(1).forEach(line => {
                        const cols = line.split(',');
                        if (descIndex === -1 || !cols[descIndex]) return;
                        const desc = cols[descIndex].trim();
                        if (!desc) return;

                        const opt = document.createElement('option');
                        opt.value = desc;
                        opt.textContent = desc;
                        opt.dataset.source = sourceLabel;
                        select.appendChild(opt);
                    });

                    ci_renderUnitOptions();
                })
                .catch(err => {
                    console.error('Error loading product file', path, err);
                });
        }

        function ci_findDescriptionIndex(headers) {
            let idx = -1;
            headers.forEach((h, i) => {
                const lower = h.toLowerCase();
                if (lower.includes('desc') || lower.includes('item')) {
                    if (idx === -1) idx = i;
                }
            });
            return idx;
        }

        function ci_collectUnitHeaders(headers) {
            headers.forEach(h => {
                const lower = h.toLowerCase();
                if (lower.includes('case') || lower.includes('box') || lower.includes('sleeve') || lower.includes('bottle')) {
                    ciUnitOptions.add(h.trim());
                }
            });
        }

        function ci_renderUnitOptions() {
            const unitSelect = document.getElementById('ciUnit');
            unitSelect.innerHTML = '<option value="">Units...</option>';
            if (ciUnitOptions.size === 0) {
                ['Case', 'Box', 'Sleeve', 'Bottle'].forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u;
                    opt.textContent = u;
                    unitSelect.appendChild(opt);
                });
                return;
            }
            Array.from(ciUnitOptions).forEach(u => {
                const opt = document.createElement('option');
                opt.value = u;
                opt.textContent = u;
                unitSelect.appendChild(opt);
            });
        }

        function ci_loadRoutes() {
            if (!token) {
                console.warn('No GitHub token available; cannot load routes.');
                return;
            }

            fetch(apiBaseUrl + 'routes?ref=' + encodeURIComponent(branch), {
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept': 'application/vnd.github+json'
                }
            })
                .then(r => {
                    if (!r.ok) throw new Error('Failed to load routes folder');
                    return r.json();
                })
                .then(items => {
                    const select = document.getElementById('ciRouteSelect');
                    items
                        .filter(it => it.type === 'file' && it.name.toLowerCase().endsWith('.csv'))
                        .forEach(it => {
                            const opt = document.createElement('option');
                            const nameNoExt = it.name.replace(/\.csv$/i, '');
                            opt.value = nameNoExt;
                            opt.textContent = nameNoExt;
                            select.appendChild(opt);
                        });
                })
                .catch(err => {
                    console.error('Error loading routes list', err);
                });
        }

        window.ci_addItemToCart = function () {
            const waterSel = document.getElementById('ciProductWater');
            const coffeeSel = document.getElementById('ciProductCoffee');
            const qtyEl = document.getElementById('ciQty');
            const unitEl = document.getElementById('ciUnit');

            const waterVal = waterSel.value;
            const coffeeVal = coffeeSel.value;
            const qty = parseInt(qtyEl.value, 10);
            const unit = unitEl.value;

            let product = '';
            let source = '';

            if (waterVal && !coffeeVal) {
                product = waterVal;
                source = 'Water';
            } else if (coffeeVal && !waterVal) {
                product = coffeeVal;
                source = 'Coffee';
            } else {
                alert('Select exactly one product (either Water or Coffee).');
                return;
            }

            if (!qty || qty <= 0) {
                alert('Enter a valid quantity.');
                return;
            }

            if (!unit) {
                alert('Select units.');
                return;
            }

            ciCart.push({ product, qty, unit, source });
            ci_renderCart();

            qtyEl.value = '';
            unitEl.value = '';
            waterSel.value = '';
            coffeeSel.value = '';
        };

        function ci_renderCart() {
            const tbody = document.getElementById('ciCartBody');
            tbody.innerHTML = '';
            ciCart.forEach((item, idx) => {
                const tr = document.createElement('tr');

                const tdProd = document.createElement('td');
                tdProd.textContent = item.product;

                const tdQty = document.createElement('td');
                tdQty.textContent = item.qty;

                const tdUnit = document.createElement('td');
                tdUnit.textContent = item.unit;

                const tdSource = document.createElement('td');
                tdSource.textContent = item.source;

                const tdAction = document.createElement('td');
                const btn = document.createElement('button');
                btn.textContent = 'Remove';
                btn.onclick = function () {
                    ciCart.splice(idx, 1);
                    ci_renderCart();
                };
                tdAction.appendChild(btn);

                tr.appendChild(tdProd);
                tr.appendChild(tdQty);
                tr.appendChild(tdUnit);
                tr.appendChild(tdSource);
                tr.appendChild(tdAction);

                tbody.appendChild(tr);
            });
        }

        window.ci_submitCallInOrder = function () {
            if (!token) {
                alert('GitHub token not available. Cannot save Call-In file.');
                return;
            }

            const customerName = document.getElementById('ciCustomerName').value.trim();
            const address = document.getElementById('ciAddress').value.trim();
            const phone = document.getElementById('ciPhone').value.trim();
            const contact = document.getElementById('ciContact').value.trim();
            const notes = document.getElementById('ciNotes').value.trim();
            const routeName = document.getElementById('ciRouteSelect').value.trim();
            const targetDate = document.getElementById('ciTargetDate').value;

            if (!customerName) {
                alert('Customer Name is required.');
                return;
            }
            if (!routeName) {
                alert('Target Route is required.');
                return;
            }
            if (!targetDate) {
                alert('Target Delivery Date is required.');
                return;
            }
            if (ciCart.length === 0) {
                alert('Add at least one item to the order.');
                return;
            }

            const createdAt = new Date();
            const createdIso = createdAt.toISOString();

            const csvLines = [];
            csvLines.push([
                'Route',
                'TargetDate',
                'CreatedAt',
                'CustomerName',
                'Address',
                'Phone',
                'Contact',
                'Notes',
                'Product',
                'Qty',
                'Unit'
            ].join(','));

            ciCart.forEach(item => {
                const row = [
                    ci_csvEscape(routeName),
                    ci_csvEscape(targetDate),
                    ci_csvEscape(createdIso),
                    ci_csvEscape(customerName),
                    ci_csvEscape(address),
                    ci_csvEscape(phone),
                    ci_csvEscape(contact),
                    ci_csvEscape(notes),
                    ci_csvEscape(item.product),
                    item.qty,
                    ci_csvEscape(item.unit)
                ];
                csvLines.push(row.join(','));
            });

            const csvContent = csvLines.join('\n');

            const today = new Date();
            const todayStr = today.getFullYear().toString() +
                String(today.getMonth() + 1).padStart(2, '0') +
                String(today.getDate()).padStart(2, '0');

            const safeRoute = routeName.replace(/[^a-zA-Z0-9_-]/g, '_');
            const fileName = 'CallIn-' + safeRoute + '-' + targetDate + '-' + todayStr + '.csv';
            const path = 'routes/' + fileName;

            const body = {
                message: 'Add Call-In order ' + fileName,
                content: btoa(unescape(encodeURIComponent(csvContent))),
                branch: branch
            };

            fetch(apiBaseUrl + encodeURIComponent(path), {
                method: 'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            })
                .then(r => r.json().then(data => ({ ok: r.ok, status: r.status, data })))
                .then(res => {
                    if (!res.ok) {
                        console.error('GitHub error', res.status, res.data);
                        alert('Failed to save Call-In file to GitHub.');
                        return;
                    }
                    alert('Call-In order created and saved to /routes as ' + fileName + '.');
                    ci_resetForm();
                })
                .catch(err => {
                    console.error('Error saving Call-In file', err);
                    alert('Error saving Call-In file.');
                });
        };

        function ci_csvEscape(value) {
            if (value === null || value === undefined) return '';
            const str = String(value);
            if (/[",\n]/.test(str)) {
                return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
        }

        function ci_resetForm() {
            document.getElementById('ciCustomerName').value = '';
            document.getElementById('ciAddress').value = '';
            document.getElementById('ciPhone').value = '';
            document.getElementById('ciContact').value = '';
            document.getElementById('ciNotes').value = '';
            document.getElementById('ciRouteSelect').value = '';
            document.getElementById('ciTargetDate').value = '';
            ciCart = [];
            ci_renderCart();
            ci_initCreatedAt();
        }

        window.ci_closeCallInModal = function () {
            if (window.parent && typeof window.parent.closeCallInPopout === 'function') {
                window.parent.closeCallInPopout();
            } else {
                window.close();
            }
        };

        window.ci_backToManagerPanel = function () {
            if (window.parent && window.parent.location) {
                window.parent.location.href = 'index.html';
            } else {
                window.location.href = 'index.html';
            }
        };
    })();
</script>
</body>
</html>
